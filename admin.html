<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理画面 - Ami Lesson</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --green: #06C755;
  --green-light: #e8faf0;
  --green-dark: #04a344;
  --red: #d93025;
  --red-light: #fff0ef;
  --yellow: #f5a623;
  --yellow-light: #fff8ec;
  --gray-bg: #f5f6f7;
  --gray-border: #e8e8e8;
  --gray-text: #888;
  --text: #1a1a1a;
  --card-shadow: 0 2px 12px rgba(0,0,0,0.07);
}

body {
  font-family: 'Noto Sans JP', -apple-system, sans-serif;
  background: var(--gray-bg);
  color: var(--text);
  font-size: 14px;
  min-height: 100vh;
}

.header {
  background: #fff;
  border-bottom: 2px solid var(--green);
  padding: 0 20px;
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 56px;
}

.header-title {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 18px;
  font-weight: 700;
  color: var(--green);
}

.refresh-btn {
  background: var(--green);
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 8px 16px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  transition: background 0.15s;
}

.refresh-btn:hover { background: var(--green-dark); }
.refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.content {
  max-width: 900px;
  margin: 0 auto;
  padding: 20px 16px;
}

.tab-row {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
  background: #fff;
  border-radius: 14px;
  padding: 6px;
  box-shadow: var(--card-shadow);
}

.tab-btn {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  background: transparent;
  color: var(--gray-text);
  transition: all 0.15s;
}

.tab-btn.active { background: var(--green); color: #fff; }

.summary-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 20px;
}

.summary-card {
  background: #fff;
  border-radius: 16px;
  padding: 16px;
  box-shadow: var(--card-shadow);
  text-align: center;
}

.summary-card .num { font-size: 32px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
.summary-card .label { font-size: 12px; color: var(--gray-text); }
.summary-card.confirmed .num { color: var(--green); }
.summary-card.cancelled .num { color: var(--red); }
.summary-card.total .num { color: #444; }

.filter-row {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  flex-wrap: wrap;
  align-items: center;
}

.filter-btn {
  padding: 7px 16px;
  border-radius: 20px;
  border: 1.5px solid var(--gray-border);
  background: #fff;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.15s;
  color: #555;
}

.filter-btn.active { background: var(--green); border-color: var(--green); color: #fff; }
.filter-btn:hover:not(.active) { border-color: var(--green); color: var(--green); }

.search-input {
  margin-left: auto;
  padding: 7px 14px;
  border-radius: 20px;
  border: 1.5px solid var(--gray-border);
  font-size: 13px;
  font-family: inherit;
  outline: none;
  width: 180px;
  transition: border 0.15s;
}

.search-input:focus { border-color: var(--green); }

.reservation-list { display: flex; flex-direction: column; gap: 10px; }

.res-card {
  background: #fff;
  border-radius: 16px;
  padding: 16px 18px;
  box-shadow: var(--card-shadow);
  border-left: 4px solid var(--green);
  transition: box-shadow 0.15s;
}

.res-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.11); }
.res-card.cancelled { border-left-color: var(--gray-border); opacity: 0.7; }
.res-card.upcoming { border-left-color: var(--yellow); }

.res-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.res-name { font-size: 15px; font-weight: 700; flex: 1; }

.badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 700;
  white-space: nowrap;
}

.badge.confirmed { background: var(--green-light); color: var(--green-dark); }
.badge.cancelled { background: #f0f0f0; color: #888; }
.badge.upcoming { background: var(--yellow-light); color: #b07000; }

.res-body {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px 16px;
  font-size: 13px;
  color: #444;
}

.res-body .item { display: flex; align-items: baseline; gap: 6px; }
.res-body .key { color: var(--gray-text); font-size: 12px; white-space: nowrap; }
.res-body .val { font-weight: 500; word-break: break-all; }

.res-footer {
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--gray-border);
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.link-btn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 5px 12px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 600;
  text-decoration: none;
  cursor: pointer;
  border: 1.5px solid;
  font-family: inherit;
  transition: all 0.15s;
  background: none;
}

.link-btn.meet { border-color: #4285f4; color: #4285f4; background: #f0f5ff; }
.link-btn.meet:hover { background: #4285f4; color: #fff; }
.link-btn.change { border-color: var(--green); color: var(--green); background: var(--green-light); }
.link-btn.change:hover { background: var(--green); color: #fff; }
.link-btn.cancel { border-color: var(--red); color: var(--red); background: var(--red-light); }
.link-btn.cancel:hover { background: var(--red); color: #fff; }
.link-btn.admin-change { border-color: var(--yellow); color: #b07000; background: var(--yellow-light); }
.link-btn.admin-change:hover { background: var(--yellow); color: #fff; }

/* 生徒カード */
.user-list { display: flex; flex-direction: column; gap: 12px; }

.user-card {
  background: #fff;
  border-radius: 16px;
  padding: 16px 18px;
  box-shadow: var(--card-shadow);
  border-left: 4px solid var(--green);
}

.user-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.user-name { font-size: 15px; font-weight: 700; flex: 1; }

.tz-display {
  font-size: 12px;
  color: var(--gray-text);
  margin-bottom: 10px;
  padding: 6px 10px;
  background: var(--gray-bg);
  border-radius: 8px;
}

.price-row { display: flex; gap: 10px; margin-bottom: 12px; }

.price-box {
  flex: 1;
  background: var(--green-light);
  border-radius: 10px;
  padding: 10px;
  text-align: center;
}

.price-box .price-label { font-size: 11px; color: var(--gray-text); margin-bottom: 4px; }
.price-box .price-val { font-size: 18px; font-weight: 700; color: var(--green-dark); }
.price-box.unset .price-val { color: var(--gray-text); font-size: 13px; }

/* 料金設定フォーム */
.price-form {
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--gray-border);
}

.price-form-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--gray-text);
  margin-bottom: 8px;
}

.price-inputs {
  display: flex;
  gap: 8px;
  margin-bottom: 8px;
  align-items: center;
}

.price-input-group {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 4px;
  background: var(--gray-bg);
  border: 1.5px solid var(--gray-border);
  border-radius: 10px;
  padding: 6px 10px;
  transition: border 0.15s;
}

.price-input-group:focus-within { border-color: var(--green); }
.price-input-group .unit { font-size: 13px; color: var(--gray-text); }
.price-input-group .min-label { font-size: 11px; color: var(--gray-text); white-space: nowrap; }

.price-input-group input {
  flex: 1;
  border: none;
  background: transparent;
  font-size: 14px;
  font-weight: 700;
  font-family: inherit;
  outline: none;
  width: 60px;
  color: var(--text);
}

.price-save-btn {
  width: 100%;
  padding: 10px;
  background: var(--green);
  color: #fff;
  border: none;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  transition: background 0.15s;
}

.price-save-btn:hover { background: var(--green-dark); }
.price-save-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.price-save-status {
  text-align: center;
  font-size: 12px;
  font-weight: 700;
  margin-top: 6px;
  min-height: 16px;
}

.price-save-status.ok { color: var(--green); }
.price-save-status.err { color: var(--red); }

.ticket-list { display: flex; flex-direction: column; gap: 6px; }

.ticket-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #f7fdf9;
  border: 1px solid #d7f3df;
  border-radius: 10px;
  padding: 8px 12px;
  font-size: 13px;
}

.ticket-row.expired { opacity: 0.5; background: #f5f5f5; border-color: var(--gray-border); }
.ticket-lesson { color: #444; font-weight: 500; }
.ticket-remaining { font-weight: 700; font-size: 16px; color: var(--green); }
.ticket-remaining.low { color: var(--yellow); }
.ticket-remaining.zero { color: var(--gray-text); }
.ticket-expiry { font-size: 11px; color: var(--gray-text); margin-top: 2px; }
.no-ticket { font-size: 13px; color: var(--gray-text); text-align: center; padding: 8px; }

/* レッスン後メッセージ */
.report-section { background: #fff; border-radius: 16px; padding: 20px; margin-bottom: 24px; box-shadow: var(--card-shadow); }
.report-section h2 { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
.report-select { width: 100%; padding: 10px 12px; border: 1.5px solid var(--gray-border); border-radius: 10px; font-size: 14px; margin-bottom: 14px; background: #fff; }
.report-field { margin-bottom: 12px; }
.report-field label { font-size: 12px; font-weight: 600; color: #555; margin-bottom: 4px; display: block; }
.report-field textarea, .report-field input[type="text"] { width: 100%; padding: 10px 12px; border: 1.5px solid var(--gray-border); border-radius: 10px; font-size: 13px; font-family: inherit; resize: vertical; transition: border-color 0.15s; }
.report-field textarea:focus, .report-field input[type="text"]:focus { border-color: var(--green); outline: none; }
.report-send-btn { width: 100%; padding: 14px; background: var(--green); color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 6px; }
.report-send-btn:disabled { opacity: 0.5; }
.report-status { font-size: 13px; text-align: center; margin-top: 10px; min-height: 20px; }
.report-status.ok { color: var(--green); }
.report-status.err { color: var(--red); }

/* モーダル */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 200;
  align-items: center;
  justify-content: center;
  padding: 16px;
}

.modal-overlay.show { display: flex; }

.modal {
  background: #fff;
  border-radius: 20px;
  padding: 24px;
  width: 100%;
  max-width: 420px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
}

.modal h3 { font-size: 18px; font-weight: 700; margin-bottom: 6px; color: var(--yellow); }
.modal .modal-sub { font-size: 13px; color: var(--gray-text); margin-bottom: 16px; }
.modal .modal-info { background: var(--yellow-light); border-radius: 12px; padding: 12px; margin-bottom: 16px; font-size: 13px; line-height: 1.8; }

.modal label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 6px; color: #555; }

.modal input {
  width: 100%;
  padding: 10px 14px;
  border: 1.5px solid var(--gray-border);
  border-radius: 10px;
  font-size: 14px;
  font-family: inherit;
  outline: none;
  margin-bottom: 14px;
  transition: border 0.15s;
}

.modal input:focus { border-color: var(--green); }

.modal-btns { display: flex; gap: 10px; }

.modal-btns button {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.15s;
}

.btn-exec { background: var(--yellow); color: #fff; }
.btn-exec:hover { background: #e09500; }
.btn-exec:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-cancel-modal { background: #e9e9e9; color: #333; }

.modal-status { margin-top: 12px; text-align: center; font-size: 13px; font-weight: 700; min-height: 20px; }
.modal-status.ok { color: var(--green); }
.modal-status.err { color: var(--red); }

/* 空・エラー */
.empty { text-align: center; padding: 48px 20px; color: var(--gray-text); }
.empty .icon { font-size: 40px; margin-bottom: 10px; }
.loading { text-align: center; padding: 48px; color: var(--gray-text); }

.spinner {
  display: inline-block;
  width: 28px; height: 28px;
  border: 3px solid var(--gray-border);
  border-top-color: var(--green);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-bottom: 10px;
}

@keyframes spin { to { transform: rotate(360deg); } }

.error-banner {
  background: var(--red-light);
  border: 1px solid #f3b6b6;
  border-radius: 12px;
  padding: 14px 18px;
  color: var(--red);
  margin-bottom: 16px;
  font-size: 13px;
  display: none;
}

@media (max-width: 500px) {
  .summary-row { gap: 8px; }
  .summary-card .num { font-size: 24px; }
  .res-body { grid-template-columns: 1fr; }
  .search-input { width: 100%; margin-left: 0; }
  .filter-row { flex-direction: column; align-items: stretch; }
}
</style>
</head>

<body>

<!-- 強制変更モーダル -->
<div class="modal-overlay" id="adminChangeModal">
  <div class="modal">
    <h3>⚡ 先生による予約変更</h3>
    <div class="modal-sub">12時間制限なしで変更できます。生徒にLINE通知が送られます。</div>
    <div class="modal-info" id="modalInfo"></div>

    <label>新しい日付</label>
    <input type="date" id="newDate">

    <label>新しい時間</label>
    <input type="time" id="newTime" step="900">

    <div class="modal-btns">
      <button class="btn-cancel-modal" onclick="closeModal()">キャンセル</button>
      <button class="btn-exec" id="execBtn" onclick="executeAdminChange()">変更する</button>
    </div>
    <div class="modal-status" id="modalStatus"></div>
  </div>
</div>

<div class="header">
  <div class="header-title">🗓️ Ami Lesson 管理画面</div>
  <button class="refresh-btn" id="refreshBtn" onclick="loadAll()">↻ 更新</button>
</div>

<div class="content">

  <div class="error-banner" id="errorBanner"></div>

  <div class="tab-row">
    <button class="tab-btn active" onclick="switchTab('reservations', this)">📋 予約一覧</button>
    <button class="tab-btn" onclick="switchTab('users', this)">👥 生徒一覧</button>
    <button class="tab-btn" onclick="window.location.href='karte.html'">📋 カルテ</button>
    <button class="tab-btn" onclick="switchTab('report', this)">📝 レッスン後</button>
  </div>

  <!-- 予約タブ -->
  <div id="reservationsTab">
    <div class="summary-row">
      <div class="summary-card confirmed"><div class="num" id="countConfirmed">-</div><div class="label">予約確定</div></div>
      <div class="summary-card total"><div class="num" id="countUpcoming">-</div><div class="label">今後のレッスン</div></div>
      <div class="summary-card cancelled"><div class="num" id="countCancelled">-</div><div class="label">キャンセル</div></div>
    </div>

    <div class="filter-row">
      <button class="filter-btn active" onclick="setFilter('all', this)">すべて</button>
      <button class="filter-btn" onclick="setFilter('confirmed', this)">予約確定</button>
      <button class="filter-btn" onclick="setFilter('upcoming', this)">今後のみ</button>
      <button class="filter-btn" onclick="setFilter('cancelled', this)">キャンセル</button>
      <input class="search-input" id="searchInput" type="text" placeholder="🔍 名前で検索..." oninput="renderReservations()">
    </div>

    <div id="reservationList" class="reservation-list">
      <div class="loading"><div class="spinner"></div><div>読み込み中...</div></div>
    </div>
  </div>

  <!-- 生徒タブ -->
  <div id="usersTab" style="display:none">
    <div class="filter-row">
      <input class="search-input" id="userSearchInput" type="text" placeholder="🔍 名前で検索..." oninput="renderUsers()" style="margin-left:0;width:100%;">
    </div>
    <div id="userList" class="user-list">
      <div class="loading"><div class="spinner"></div><div>読み込み中...</div></div>
    </div>
  </div>

  <!-- レッスン後メッセージタブ -->
  <div id="reportTab" style="display:none">
    <div class="report-section">
      <h2>📝 レッスン後メッセージを送る</h2>

      <div class="report-field">
        <label>生徒を選択</label>
        <select class="report-select" id="reportStudentSelect">
          <option value="">-- 生徒を選んでください --</option>
        </select>
      </div>

      <div class="report-field">
        <label>📚 今日勉強したこと</label>
        <textarea id="reportStudied" rows="2" placeholder="例：て形・た形の活用"></textarea>
      </div>

      <div class="report-field">
        <label>✨ 新しい単語</label>
        <textarea id="reportWords" rows="2" placeholder="例：食べる・飲む・行く・来る・帰る"></textarea>
      </div>

      <div class="report-field">
        <label>🔗 教科書URL</label>
        <input type="text" id="reportUrl" placeholder="https://...">
      </div>

      <div class="report-field">
        <label>📌 宿題</label>
        <textarea id="reportHomework" rows="2" placeholder="例：ワークブック p.24〜26 を解いてみてください"></textarea>
      </div>

      <div class="report-field">
        <label>🔄 次回復習してほしいこと</label>
        <textarea id="reportReview" rows="2" placeholder="例：て形の作り方をもう一度確認してください"></textarea>
      </div>

      <div class="report-field">
        <label>💬 先生からの一言</label>
        <textarea id="reportComment" rows="2" placeholder="例：今日はとても上手でした！"></textarea>
      </div>

      <button class="report-send-btn" id="reportSendBtn" onclick="sendLessonReport()">📩 送信する</button>
      <div class="report-status" id="reportStatus"></div>
    </div>
  </div>

</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbzRX0UZSwDW3h9V7tUGA1grjhNlfU9e60H4hGzABbAJl0cWn40VFwy4D2mY-vgEvSY/exec";

let allReservations = [];
let allUsers = [];
let currentFilter = "all";
let selectedReservationId = "";

function switchTab(tab, btn) {
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById("reservationsTab").style.display = tab === "reservations" ? "block" : "none";
  document.getElementById("usersTab").style.display = tab === "users" ? "block" : "none";
  document.getElementById("reportTab").style.display = tab === "report" ? "block" : "none";
}

async function sendLessonReport() {
  const userId = document.getElementById("reportStudentSelect").value;
  if (!userId) { alert("生徒を選択してください。"); return; }

  const studied   = document.getElementById("reportStudied").value.trim();
  const words     = document.getElementById("reportWords").value.trim();
  const textbookUrl = document.getElementById("reportUrl").value.trim();
  const homework  = document.getElementById("reportHomework").value.trim();
  const review    = document.getElementById("reportReview").value.trim();
  const comment   = document.getElementById("reportComment").value.trim();

  if (!studied && !words && !url && !homework && !review && !comment) {
    alert("内容を1つ以上入力してください。"); return;
  }

  const btn = document.getElementById("reportSendBtn");
  const statusEl = document.getElementById("reportStatus");
  btn.disabled = true;
  btn.textContent = "送信中...";
  statusEl.textContent = "";
  statusEl.className = "report-status";

  try {
    const params = new URLSearchParams({
      action: "sendLessonReport",
      userId, studied, words, url: textbookUrl, homework, review, comment,
      t: Date.now()
    });
    console.log("送信URL:", GAS_URL + "?" + params.toString());
    const res = await fetch(GAS_URL + "?" + params.toString());
    const data = await res.json();
    if (data.ok) {
      statusEl.textContent = "✅ 送信しました！";
      statusEl.className = "report-status ok";
      document.getElementById("reportStudied").value = "";
      document.getElementById("reportWords").value = "";
      document.getElementById("reportUrl").value = "";
      document.getElementById("reportHomework").value = "";
      document.getElementById("reportReview").value = "";
      document.getElementById("reportComment").value = "";
    } else {
      statusEl.textContent = "⚠️ " + (data.message || "送信に失敗しました。");
      statusEl.className = "report-status err";
    }
  } catch (e) {
    statusEl.textContent = "エラーが発生しました。";
    statusEl.className = "report-status err";
  }
  btn.disabled = false;
  btn.textContent = "📩 送信する";
}

async function loadAll() {
  const btn = document.getElementById("refreshBtn");
  btn.disabled = true;
  btn.textContent = "読み込み中...";
  document.getElementById("errorBanner").style.display = "none";
  document.getElementById("reservationList").innerHTML = `<div class="loading"><div class="spinner"></div><div>読み込み中...</div></div>`;
  document.getElementById("userList").innerHTML = `<div class="loading"><div class="spinner"></div><div>読み込み中...</div></div>`;

  try {
    const [resRes, userRes] = await Promise.all([
      fetch(GAS_URL + "?action=getReservations&t=" + Date.now()),
      fetch(GAS_URL + "?action=getUsers&t=" + Date.now())
    ]);

    const resData = await resRes.json();
    const userData = await userRes.json();

    if (!resData.ok) throw new Error(resData.message || "取得失敗");

    allReservations = resData.reservations || [];
    allUsers = userData.ok ? (userData.users || []) : [];

    // レッスン後メッセージのプルダウンを更新
    const sel = document.getElementById("reportStudentSelect");
    sel.innerHTML = '<option value="">-- 生徒を選んでください --</option>';
    allUsers.forEach(u => {
      const opt = document.createElement("option");
      opt.value = u.userId;
      opt.textContent = u.name;
      sel.appendChild(opt);
    });

    updateSummary();
    renderReservations();
    renderUsers();

  } catch (e) {
    console.error(e);
    const banner = document.getElementById("errorBanner");
    banner.textContent = "⚠️ データを取得できませんでした。";
    banner.style.display = "block";
  } finally {
    btn.disabled = false;
    btn.textContent = "↻ 更新";
  }
}

function updateSummary() {
  const now = new Date();
  const confirmed = allReservations.filter(r => r.status === "予約確定");
  const cancelled = allReservations.filter(r => r.status === "キャンセル");
  const upcoming = confirmed.filter(r => new Date(`${r.date}T${r.time}:00+09:00`) > now);
  document.getElementById("countConfirmed").textContent = confirmed.length;
  document.getElementById("countCancelled").textContent = cancelled.length;
  document.getElementById("countUpcoming").textContent = upcoming.length;
}

function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderReservations();
}

function renderReservations() {
  const now = new Date();
  const search = document.getElementById("searchInput").value.trim().toLowerCase();

  let list = allReservations.filter(r => {
    if (search && !r.name.toLowerCase().includes(search)) return false;
    if (currentFilter === "confirmed") return r.status === "予約確定";
    if (currentFilter === "cancelled") return r.status === "キャンセル";
    if (currentFilter === "upcoming") {
      if (r.status !== "予約確定") return false;
      return new Date(`${r.date}T${r.time}:00+09:00`) > now;
    }
    return true;
  });

  list.sort((a, b) => {
    const da = new Date(`${a.date}T${a.time}:00+09:00`);
    const db = new Date(`${b.date}T${b.time}:00+09:00`);
    return db - da;
  });

  const container = document.getElementById("reservationList");

  if (!list.length) {
    container.innerHTML = `<div class="empty"><div class="icon">📭</div><div>該当する予約がありません</div></div>`;
    return;
  }

  container.innerHTML = list.map(r => renderResCard(r, now)).join("");
}

function renderResCard(r, now) {
  const lessonDt = new Date(`${r.date}T${r.time}:00+09:00`);
  const isCancelled = r.status === "キャンセル";
  const isUpcoming = !isCancelled && lessonDt > now;

  const cardClass = isCancelled ? "cancelled" : isUpcoming ? "upcoming" : "";
  const badgeClass = isCancelled ? "cancelled" : isUpcoming ? "upcoming" : "confirmed";
  const badgeText = isCancelled ? "キャンセル" : isUpcoming ? "予定あり" : "完了";

  const changeUrl = `https://ami-app-eta.vercel.app/change.html?id=${encodeURIComponent(r.reservationId)}`;
  const cancelUrl = `https://ami-app-eta.vercel.app/cancel.html?id=${encodeURIComponent(r.reservationId)}`;
  const isTicket = String(r.paymentIntentId || "").startsWith("ticket:");
  const priceText = isTicket ? "回数券" : "$" + escHtml(String(r.price));
  const refundLabel = r.refundStatus ? `<div class="item"><span class="key">返金：</span><span class="val">${r.refundStatus}</span></div>` : "";
  const infoStr = escHtml(r.name) + " / " + escHtml(r.lesson) + " / " + escHtml(r.date) + " " + escHtml(r.time);

  const footerBtns = isCancelled ? "" : `
    ${r.meetUrl ? `<a class="link-btn meet" href="${r.meetUrl}" target="_blank">📹 Meet</a>` : ""}
    ${isUpcoming ? `<a class="link-btn change" href="${changeUrl}" target="_blank">📝 変更</a>` : ""}
    ${isUpcoming ? `<a class="link-btn cancel" href="${cancelUrl}" target="_blank">🗑 キャンセル</a>` : ""}
    <button class="link-btn admin-change" onclick="openAdminChange('${r.reservationId}', '${infoStr}')">⚡ 強制変更</button>
  `;

  return `
    <div class="res-card ${cardClass}">
      <div class="res-header">
        <div class="res-name">${escHtml(r.name)}</div>
        <span class="badge ${badgeClass}">${badgeText}</span>
      </div>
      <div class="res-body">
        <div class="item"><span class="key">日時：</span><span class="val">${escHtml(r.date)} ${escHtml(r.time)}</span></div>
        <div class="item"><span class="key">レッスン：</span><span class="val">${escHtml(r.lesson)}</span></div>
        <div class="item"><span class="key">料金：</span><span class="val">${priceText}</span></div>
        <div class="item"><span class="key">ステータス：</span><span class="val">${escHtml(r.status)}</span></div>
        ${refundLabel}
      </div>
      ${footerBtns ? `<div class="res-footer">${footerBtns}</div>` : ""}
    </div>`;
}

// ===== 強制変更モーダル =====
function openAdminChange(reservationId, info) {
  selectedReservationId = reservationId;
  document.getElementById("modalInfo").textContent = info;
  document.getElementById("newDate").value = "";
  document.getElementById("newTime").value = "";
  document.getElementById("modalStatus").textContent = "";
  document.getElementById("modalStatus").className = "modal-status";
  document.getElementById("execBtn").disabled = false;
  document.getElementById("adminChangeModal").classList.add("show");
}

function closeModal() {
  document.getElementById("adminChangeModal").classList.remove("show");
}

async function executeAdminChange() {
  const newDate = document.getElementById("newDate").value;
  const newTime = document.getElementById("newTime").value;

  if (!newDate || !newTime) {
    document.getElementById("modalStatus").textContent = "日付と時間を入力してください。";
    document.getElementById("modalStatus").className = "modal-status err";
    return;
  }

  const execBtn = document.getElementById("execBtn");
  const statusEl = document.getElementById("modalStatus");
  execBtn.disabled = true;
  statusEl.textContent = "変更中...";
  statusEl.className = "modal-status";

  try {
    const res = await fetch(
      GAS_URL +
      "?action=adminChange" +
      "&id=" + encodeURIComponent(selectedReservationId) +
      "&date=" + encodeURIComponent(newDate) +
      "&time=" + encodeURIComponent(newTime) +
      "&t=" + Date.now()
    );

    const data = await res.json();

    if (data.ok) {
      statusEl.textContent = "✅ 変更しました！生徒にLINE通知を送りました。";
      statusEl.className = "modal-status ok";
      setTimeout(() => { closeModal(); loadAll(); }, 1500);
    } else {
      statusEl.textContent = "⚠️ " + (data.message || "変更に失敗しました。");
      statusEl.className = "modal-status err";
      execBtn.disabled = false;
    }
  } catch (e) {
    console.error(e);
    statusEl.textContent = "エラーが発生しました。";
    statusEl.className = "modal-status err";
    execBtn.disabled = false;
  }
}

document.getElementById("adminChangeModal").addEventListener("click", function(e) {
  if (e.target === this) closeModal();
});

// ===== 生徒一覧 =====
function renderUsers() {
  const search = document.getElementById("userSearchInput").value.trim().toLowerCase();
  let list = allUsers.filter(u => !search || u.name.toLowerCase().includes(search));

  const container = document.getElementById("userList");

  if (!list.length) {
    container.innerHTML = `<div class="empty"><div class="icon">👥</div><div>生徒が見つかりません</div></div>`;
    return;
  }

  container.innerHTML = list.map(u => renderUserCard(u)).join("");
}

function renderUserCard(u) {
  const now = new Date();
  const price25 = u.price25 ? `$${u.price25}` : null;
  const price50 = u.price50 ? `$${u.price50}` : null;
  const tzDisplay = u.timezone ? `🌍 ${u.timezone}` : '🌍 タイムゾーン未設定';

  const ticketCount = u.tickets ? u.tickets.length : 0;
  const validCount = u.tickets ? u.tickets.filter(t => t.isValid).length : 0;
  const ticketSummary = ticketCount === 0 ? '回数券なし' : `${validCount}種類有効 / 計${ticketCount}枚`;

  const ticketsHtml = u.tickets && u.tickets.length > 0
    ? u.tickets.map(t => {
        const expiry = new Date(t.expiry + "T23:59:59+09:00");
        const isExpired = expiry < now || t.remaining <= 0;
        const isLow = !isExpired && t.remaining <= 2;
        const expiryParts = t.expiry.split("-");
        const expiryStr = `${Number(expiryParts[1])}/${Number(expiryParts[2])}まで`;
        const remClass = isExpired ? "zero" : isLow ? "low" : "";
        return `
          <div class="ticket-row ${isExpired ? 'expired' : ''}">
            <div>
              <div class="ticket-lesson">${escHtml(t.lesson)}</div>
              <div class="ticket-expiry">${expiryStr}</div>
            </div>
            <div class="ticket-remaining ${remClass}">${isExpired ? '期限切れ' : t.remaining + '回'}</div>
          </div>`;
      }).join("")
    : `<div class="no-ticket">回数券なし</div>`;

  return `
    <div class="user-card" id="usercard-${escHtml(u.userId)}">
      <div class="user-header">
        <div class="user-name">👤 ${escHtml(u.name)}</div>
      </div>
      <div class="tz-display">${tzDisplay}</div>
      <div class="price-form" style="margin-bottom:10px;">
        <div class="price-form-title">🌍 タイムゾーンを変更する</div>
        <select id="tz-${escHtml(u.userId)}" style="width:100%;padding:8px 12px;border:1.5px solid var(--gray-border);border-radius:10px;font-size:13px;font-family:inherit;outline:none;margin-bottom:8px;background:#fff;">
          <option value="">-- 選択してください --</option>
          ${TIMEZONE_OPTIONS.map(tz => `<option value="${tz.value}" ${u.timezone === tz.value ? 'selected' : ''}>${tz.label}</option>`).join('')}
        </select>
        <button class="price-save-btn" style="background:var(--yellow);" onclick="saveUserTimezone('${escHtml(u.userId)}')">💾 タイムゾーンを保存</button>
        <div class="price-save-status" id="tzStatus-${escHtml(u.userId)}"></div>
      </div>
      <div class="price-row">
        <div class="price-box ${!price25 ? 'unset' : ''}">
          <div class="price-label">25分</div>
          <div class="price-val">${price25 || '未設定'}</div>
        </div>
        <div class="price-box ${!price50 ? 'unset' : ''}">
          <div class="price-label">50分</div>
          <div class="price-val">${price50 || '未設定'}</div>
        </div>
      </div>
      <div class="price-form">
        <div class="price-form-title">💰 料金を設定して通知する</div>
        <div class="price-inputs">
          <div class="price-input-group">
            <span class="min-label">25分</span>
            <span class="unit">$</span>
            <input type="number" id="p25-${escHtml(u.userId)}" placeholder="${u.price25 || '0'}" min="0" step="1">
          </div>
          <div class="price-input-group">
            <span class="min-label">50分</span>
            <span class="unit">$</span>
            <input type="number" id="p50-${escHtml(u.userId)}" placeholder="${u.price50 || '0'}" min="0" step="1">
          </div>
        </div>
        <button class="price-save-btn" onclick="saveUserPrice('${escHtml(u.userId)}')">💾 保存してLINE通知を送る</button>
        <div class="price-save-status" id="priceStatus-${escHtml(u.userId)}"></div>
      </div>
      <div class="ticket-list" style="margin-top:12px;">
        <button onclick="window.location.href='karte.html?userId=${escHtml(u.userId)}'" style="width:100%;margin-top:10px;padding:10px;background:#f8faf9;border:1px solid #d7f3df;border-radius:10px;color:#06C755;font-size:13px;font-weight:600;cursor:pointer;">📋 カルテを見る</button>
        <div onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'; this.querySelector('.toggle-icon').textContent=this.nextElementSibling.style.display==='none'?'▶':'▼';"
          style="display:flex;justify-content:space-between;align-items:center;cursor:pointer;padding:8px 10px;background:#f8f8f8;border-radius:8px;font-size:13px;color:#555;user-select:none;">
          <span>🎟️ 回数券 <span style="font-size:11px;color:#999;">${ticketSummary}</span></span>
          <span class="toggle-icon" style="font-size:11px;color:#aaa;">▶</span>
        </div>
        <div style="display:none;margin-top:6px;">${ticketsHtml}</div>
      </div>
    </div>`;
}

async function saveUserPrice(userId) {
  const price25 = document.getElementById(`p25-${userId}`).value.trim();
  const price50 = document.getElementById(`p50-${userId}`).value.trim();
  const statusEl = document.getElementById(`priceStatus-${userId}`);
  const btn = document.querySelector(`#usercard-${userId} .price-save-btn`);

  if (!price25 && !price50) {
    statusEl.textContent = "料金を入力してください。";
    statusEl.className = "price-save-status err";
    return;
  }

  btn.disabled = true;
  statusEl.textContent = "保存中...";
  statusEl.className = "price-save-status";

  try {
    const res = await fetch(
      GAS_URL +
      "?action=setUserPrice" +
      "&userId=" + encodeURIComponent(userId) +
      "&price25=" + encodeURIComponent(price25) +
      "&price50=" + encodeURIComponent(price50) +
      "&t=" + Date.now()
    );
    const data = await res.json();

    if (data.ok) {
      statusEl.textContent = "✅ 保存しました！LINE通知を送りました。";
      statusEl.className = "price-save-status ok";
      setTimeout(() => loadAll(), 2000);
    } else {
      statusEl.textContent = "⚠️ " + (data.message || "保存に失敗しました。");
      statusEl.className = "price-save-status err";
      btn.disabled = false;
    }
  } catch (e) {
    console.error(e);
    statusEl.textContent = "エラーが発生しました。";
    statusEl.className = "price-save-status err";
    btn.disabled = false;
  }
}

];

async function saveUserTimezone(userId) {
  const tz = document.getElementById(`tz-${userId}`).value;
  const statusEl = document.getElementById(`tzStatus-${userId}`);
  const btn = document.querySelector(`#usercard-${userId} [onclick="saveUserTimezone('${userId}')"]`);

  if (!tz) {
    statusEl.textContent = "タイムゾーンを選択してください。";
    statusEl.className = "price-save-status err";
    return;
  }

  btn.disabled = true;
  statusEl.textContent = "保存中...";
  statusEl.className = "price-save-status";

  try {
    const res = await fetch(
      GAS_URL +
      "?action=setUserTimezone" +
      "&userId=" + encodeURIComponent(userId) +
      "&timezone=" + encodeURIComponent(tz) +
      "&t=" + Date.now()
    );
    const data = await res.json();

    if (data.ok) {
      statusEl.textContent = "✅ 保存しました！";
      statusEl.className = "price-save-status ok";
      setTimeout(() => loadAll(), 1500);
    } else {
      statusEl.textContent = "⚠️ " + (data.message || "保存に失敗しました。");
      statusEl.className = "price-save-status err";
      btn.disabled = false;
    }
  } catch (e) {
    console.error(e);
    statusEl.textContent = "エラーが発生しました。";
    statusEl.className = "price-save-status err";
    btn.disabled = false;
  }
}

function escHtml(str) {
  return String(str || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

loadAll();
