<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>キャンセル確認</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  padding: 16px;
  font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
  background: #f5f6f7;
  color: #222;
  font-size: 16px;
}

.container {
  max-width: 460px;
  margin: 0 auto;
}

.card {
  background: #fff;
  padding: 28px 20px;
  border-radius: 24px;
  margin-top: 20px;
  box-shadow: 0 10px 28px rgba(0,0,0,0.10);
}

.hidden { display: none; }

.icon {
  text-align: center;
  font-size: 52px;
  margin-bottom: 8px;
}

h2 {
  text-align: center;
  font-size: 24px;
  margin: 0 0 12px;
}

.red { color: #d93025; }
.green { color: #06C755; }

.lead {
  color: #555;
  line-height: 1.8;
  font-size: 16px;
  text-align: center;
}

.lesson-card {
  background: #fff5f5;
  border: 1px solid #f3b6b6;
  border-radius: 18px;
  padding: 18px;
  margin: 18px 0;
  font-size: 16px;
  line-height: 1.9;
}

.warning-box {
  background: #fff8e8;
  border: 1px solid #f2c56b;
  border-radius: 18px;
  padding: 18px;
  margin: 18px 0;
  font-size: 15px;
  line-height: 1.9;
  color: #5f4200;
}

button {
  width: 100%;
  border: none;
  border-radius: 16px;
  padding: 17px;
  font-size: 17px;
  font-weight: bold;
  cursor: pointer;
  margin-top: 12px;
  touch-action: manipulation;
}

.cancel {
  background: #d93025;
  color: white;
  box-shadow: 0 6px 14px rgba(217,48,37,0.22);
}

.back {
  background: #e9e9e9;
  color: #333;
}

.result-message {
  white-space: pre-line;
  line-height: 1.9;
  font-size: 16px;
  font-weight: bold;
  color: #333;
  margin-top: 16px;
  text-align: center;
}

.small {
  margin-top: 18px;
  font-size: 14px;
  color: #777;
  line-height: 1.7;
  text-align: center;
}

.status {
  margin-top: 16px;
  white-space: pre-line;
  text-align: center;
  font-weight: bold;
  color: #06C755;
}
</style>
</head>

<body>
<div class="container">

  <div class="card" id="confirmCard">
    <div class="icon">⚠️</div>
    <h2 class="red">キャンセル確認</h2>

    <div class="lead">
      以下のレッスンをキャンセルしますか？<br>
      内容をご確認ください。
    </div>

    <div class="lesson-card" id="reservationInfo">
      読み込み中...
    </div>

    <div class="warning-box">
      <strong>返金ルール</strong><br>
      ・レッスン開始12時間前まで：キャンセル・返金対象です。<br>
      ・決済手数料分は返金されません。<br>
      ・12時間前を過ぎた場合：キャンセル・返金はできません。<br>
      ・欠席を希望する場合は、LINEで先生にご連絡ください。
    </div>

    <button class="cancel" type="button" id="cancelBtn">
      キャンセルを確定する
    </button>

    <button class="back" type="button" onclick="window.close()">
      閉じる
    </button>

    <div class="status" id="status"></div>
  </div>

  <div class="card hidden" id="resultCard">
    <div class="icon" id="resultIcon">✅</div>
    <h2 id="resultTitle" class="green">キャンセルしました</h2>
    <div class="result-message" id="resultMessage"></div>
    <div class="small">このページは閉じて大丈夫です。</div>
    <button class="back" type="button" onclick="window.close()">閉じる</button>
  </div>

</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbzRX0UZSwDW3h9V7tUGA1grjhNlfU9e60H4hGzABbAJl0cWn40VFwy4D2mY-vgEvSY/exec";

let reservationId = "";
let reservationData = null;

async function loadCancelData() {
  const params = new URLSearchParams(window.location.search);
  reservationId = params.get("id");

  if (!reservationId) {
    showResult(false, "予約IDが見つかりませんでした。");
    return;
  }

  try {
    const res = await fetch(
      GAS_URL + "?action=cancelData&id=" + encodeURIComponent(reservationId) + "&t=" + Date.now()
    );

    const data = await res.json();

    if (!data.ok) {
      showResult(false, data.message || "予約情報を取得できませんでした。");
      return;
    }

    reservationData = data.reservation;

    document.getElementById("reservationInfo").innerHTML =
      "<strong>レッスン：</strong>" + reservationData.lesson + "<br>" +
      "<strong>日時：</strong>" + reservationData.date + " " + reservationData.time + "<br>" +
      "<strong>料金：</strong>" + reservationData.price;

  } catch (e) {
    console.error(e);
    showResult(false, "読み込みに失敗しました。先生にご連絡ください。");
  }
}

async function executeCancel() {
  const ok = confirm(
    "本当にこのレッスンをキャンセルしますか？\n\n" +
    "※レッスン開始12時間前を過ぎている場合は、キャンセル・返金はできません。\n" +
    "欠席を希望する場合は、LINEで先生にご連絡ください。"
  );

  if (!ok) return;

  const status = document.getElementById("status");
  const btn = document.getElementById("cancelBtn");

  btn.disabled = true;
  status.textContent = "キャンセル処理を確認しています...";

  try {
    const url =
      GAS_URL +
      "?action=cancelExecute" +
      "&mode=raw" +
      "&id=" + encodeURIComponent(reservationId) +
      "&t=" + Date.now();

    const res = await fetch(url);
    const message = await res.text();

    const isSuccess =
      message.includes("キャンセルしました") ||
      message.includes("返金処理も完了しました");

    if (isSuccess) {
      showResult(true, message);
    } else {
      showResult(false,
        message + "\n\n欠席を希望する場合は、LINEで先生にご連絡ください。"
      );
    }

  } catch (e) {
    console.error(e);
    showResult(false, "キャンセル処理に失敗しました。\n先生にご連絡ください。");
  }
}

function showResult(isSuccess, message) {
  document.getElementById("confirmCard").classList.add("hidden");
  document.getElementById("resultCard").classList.remove("hidden");

  const icon = document.getElementById("resultIcon");
  const title = document.getElementById("resultTitle");
  const msg = document.getElementById("resultMessage");

  if (isSuccess) {
    icon.textContent = "✅";
    title.textContent = "キャンセルしました";
    title.className = "green";
  } else {
    icon.textContent = "⚠️";
    title.textContent = "キャンセルできません";
    title.className = "red";
  }

  msg.textContent = message || "";
}

document.getElementById("cancelBtn").addEventListener("click", executeCancel);

loadCancelData();
</script>
</body>
</html>
