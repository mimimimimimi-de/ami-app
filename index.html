<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ami Lesson Booking</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>

<h2>レッスンを選んでください</h2>

<button onclick="selectLesson(25)">25分レッスン</button>
<button onclick="selectLesson(50)">50分レッスン</button>

<p id="result"></p>

<script>
const LIFF_ID = "2009874208-p2dHU5i2";

let userId = null;
let displayName = "未設定";

async function initializeLiff() {
  await liff.init({ liffId: LIFF_ID });

  if (!liff.isLoggedIn()) {
    liff.login();
    return;
  }

  const profile = await liff.getProfile();
  userId = profile.userId;
  displayName = profile.displayName || "未設定";

  console.log("userId:", userId);
  console.log("displayName:", displayName);
}

async function fetchUserPrice(minutes) {
  const res = await fetch(
    "/api/get-user-price"
    + "?userId=" + encodeURIComponent(userId)
    + "&lessonType=" + minutes
    + "&name=" + encodeURIComponent(displayName)
  );

  const data = await res.json();

  if (!data.ok) {
    throw new Error("価格取得失敗");
  }

  return data.price;
}

async function selectLesson(minutes) {
  try {
    if (!userId) {
      await initializeLiff();
    }

    const price = await fetchUserPrice(minutes);

    document.getElementById("result").innerText =
      `${minutes}分レッスン：$${price}`;

  } catch (e) {
    document.getElementById("result").innerText =
      "エラーが発生しました";
    console.error(e);
  }
}

initializeLiff();
</script>

</body>
</html>
