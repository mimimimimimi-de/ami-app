<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ami Lesson Booking</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body { font-family:sans-serif; background:#f5f6f7; padding:20px; font-size:16px;}
.container { max-width:460px; margin:auto;}
.card { background:#fff; padding:20px; border-radius:18px; margin-top:20px;}
.hidden{display:none;}
button{width:100%;padding:14px;margin-top:10px;border:none;border-radius:12px;font-size:16px;}
.main{background:#06C755;color:#fff;}
.sub{background:#eee;}
.price{font-size:30px;text-align:center;color:#06C755;}

#calendar{overflow-x:auto;}
.calendar-table{width:100%;min-width:700px;border-collapse:collapse;}
.calendar-table th,.calendar-table td{border:1px solid #eee;padding:10px;text-align:center;}
.calendar-table th{background:#f9f9f9;}

.available{color:#06C755;font-size:20px;cursor:pointer;}
.unavailable{color:#ccc;}

.nav{display:flex;gap:10px;margin-top:10px;}
</style>
</head>

<body>
<div class="container">

<div class="card" id="top">
<h2>レッスン選択</h2>
<button class="main" onclick="selectLesson(25)">25分</button>
<button class="main" onclick="selectLesson(50)">50分</button>
</div>

<div class="card hidden" id="price">
<h2>料金</h2>
<div id="lesson"></div>
<div class="price" id="priceText">-</div>
<button class="sub" onclick="go('top')">戻る</button>
<button class="main" onclick="openCalendar()">次へ</button>
</div>

<div class="card hidden" id="calendarPage">
<h2>日時選択</h2>

<div class="nav">
<button class="sub" onclick="prevWeek()">←</button>
<button class="sub" onclick="nextWeek()">→</button>
</div>

<div id="calendar"></div>

<button class="sub" onclick="go('price')">戻る</button>
</div>

<div class="card hidden" id="confirmPage">
<h2>確認</h2>
<p id="confirm"></p>
<button class="sub" onclick="go('calendarPage')">戻る</button>
<button class="main" onclick="checkout()">決済</button>
</div>

</div>

<script>
const LIFF_ID="2009890655-9G9Ve0wB";
const GAS_URL="https://script.google.com/macros/s/AKfycbzRX0UZSwDW3h9V7tUGA1grjhNlfU9e60H4hGzABbAJl0cWn40VFwy4D2mY-vgEvSY/exec";

let userId=null;
let displayName="未設定";
let selectedMinutes, selectedPrice;
let selectedDate, selectedTime;
let weekOffset=0;

function go(id){
document.querySelectorAll(".card").forEach(c=>c.classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");
}

// 🔥 userId + 名前取得
async function init(){
try{
await liff.init({liffId:LIFF_ID});

if(!liff.isLoggedIn()){
liff.login();
return;
}

const p=await liff.getProfile();
userId=p.userId;
displayName=p.displayName || "未設定";

console.log("userId:",userId);
console.log("name:",displayName);

}catch(e){
console.error(e);
}
}

// 🔥 修正済み selectLesson
async function selectLesson(m){
selectedMinutes=m;
go("price");

document.getElementById("lesson").textContent=m+"分";
document.getElementById("priceText").textContent="料金を取得中...";

if(!userId){
await init();
}

try{
const res=await fetch(
`/api/get-user-price?userId=${encodeURIComponent(userId)}&lessonType=${m}&name=${encodeURIComponent(displayName)}`
);

const data=await res.json();

if(!data.ok){
document.getElementById("priceText").textContent="料金未設定";

alert(
"料金が設定されていません。\n\nこのIDをusersシートに登録してください👇\n\n"+userId
);

return;
}

selectedPrice=data.price;
document.getElementById("priceText").textContent="$"+data.price;

}catch(e){
console.error(e);
document.getElementById("priceText").textContent="取得失敗";
}
}

function format(d){
return d.toISOString().slice(0,10);
}

function addDays(base,days){
let d=new Date(base);
d.setDate(d.getDate()+days);
return d;
}

function openCalendar(){
weekOffset=0;
generate();
go("calendarPage");
}

function prevWeek(){weekOffset-=7;generate();}
function nextWeek(){weekOffset+=7;generate();}

// 🔥 完全重複判定
function overlap(start,end,busy){
return busy.some(b=>{
if(b.start && b.end){
let bs=new Date(b.start);
let be=new Date(b.end);
return !(end<=bs || start>=be);
}
if(b.date && b.time){
if(b.date!==start.toISOString().slice(0,10))return false;
let bs=new Date(b.date+"T"+b.time);
let be=new Date(bs.getTime()+60*60000);
return !(end<=bs || start>=be);
}
return false;
});
}

async function generate(){
const busy=await fetch(GAS_URL).then(r=>r.json());

const today=new Date();
let days=[];

for(let i=0;i<7;i++){
let d=addDays(today,weekOffset+i);
if(d.getDay()!=0)days.push(d);
}

let times=[];
for(let h=7;h<=22;h++){
["00","15","30","45"].forEach(m=>{
times.push(`${String(h).padStart(2,"0")}:${m}`);
});
}

let html="<table class='calendar-table'><tr><th></th>";
days.forEach(d=>html+=`<th>${format(d)}</th>`);
html+="</tr>";

times.forEach(t=>{
html+=`<tr><td>${t}</td>`;

days.forEach(d=>{
let date=format(d);

let start=new Date(date+"T"+t);
let duration = selectedMinutes==50 ? 60 : 35;
let end=new Date(start.getTime()+duration*60000);

let tooSoon=start-new Date()<12*60*60*1000;
let isBusy=overlap(start,end,busy);

if(!tooSoon && !isBusy){
html+=`<td class="available" onclick="pick('${date}','${t}')">○</td>`;
}else{
html+=`<td class="unavailable">×</td>`;
}
});

html+="</tr>";
});

html+="</table>";
document.getElementById("calendar").innerHTML=html;
}

function pick(d,t){
selectedDate=d;
selectedTime=t;

document.getElementById("confirm").textContent=
`${d} ${t} / ${selectedMinutes}分 / $${selectedPrice}`;

go("confirmPage");
}

async function checkout(){
localStorage.setItem("selectedDate",selectedDate);
localStorage.setItem("selectedTime",selectedTime);
localStorage.setItem("lessonType",selectedMinutes);
localStorage.setItem("price",selectedPrice);

const res=await fetch("/api/create-checkout-session",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
lessonType:selectedMinutes,
selectedDate,
selectedTime,
userId
})
});

const data=await res.json();
window.location.href=data.url;
}

window.onload = init;
</script>
</body>
</html>
