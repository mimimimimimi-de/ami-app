<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ami Lesson Booking</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body { font-family: sans-serif; background:#f7f7f7; padding:20px; }
.container { max-width:420px; margin:auto; }
.card { background:#fff; padding:20px; border-radius:16px; margin-top:20px; }
.hidden { display:none; }
button { width:100%; padding:14px; margin-top:10px; border:none; border-radius:10px; }
.main { background:#06C755; color:#fff; }
.sub { background:#999; color:#fff; }

#calendar { overflow-x:auto; }

.calendar-table {
  width:100%;
  border-collapse:collapse;
  text-align:center;
}

.calendar-table th, .calendar-table td {
  border:1px solid #eee;
  padding:6px;
  font-size:12px;
}

.available { color:#06C755; font-weight:bold; cursor:pointer; }
.unavailable { color:#ccc; }

.price { font-size:28px; color:#06C755; text-align:center; }
</style>
</head>

<body>
<div class="container">

<div class="card" id="page-top">
<h2>レッスン選択</h2>
<button class="main" onclick="selectLesson(25)">25分</button>
<button class="main" onclick="selectLesson(50)">50分</button>
</div>

<div class="card hidden" id="page-price">
<h2>料金</h2>
<div id="lesson-name"></div>
<div class="price" id="lesson-price"></div>
<button class="sub" onclick="go('page-top')">戻る</button>
<button class="main" onclick="showCalendar()">次へ</button>
</div>

<div class="card hidden" id="page-calendar">
<h2>日時選択</h2>
<div id="calendar"></div>
<button class="sub" onclick="go('page-price')">戻る</button>
</div>

<div class="card hidden" id="page-confirm">
<h2>確認</h2>
<p id="confirm"></p>
<button class="sub" onclick="go('page-calendar')">戻る</button>
<button class="main" onclick="checkout()">決済</button>
</div>

</div>

<script>
const LIFF_ID = "2009890655-9G9Ve0wB";
const GAS_URL = "https://script.google.com/macros/s/AKfycbzRX0UZSwDW3h9V7tUGA1grjhNlfU9e60H4hGzABbAJl0cWn40VFwy4D2mY-vgEvSY/exec";

let userId, selectedMinutes, selectedPrice, selectedDate, selectedTime;

function go(id){
  document.querySelectorAll(".card").forEach(c=>c.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
}

async function init(){
  await liff.init({ liffId: LIFF_ID });
  if(!liff.isLoggedIn()) liff.login();
  const p = await liff.getProfile();
  userId = p.userId;
}

async function selectLesson(m){
  selectedMinutes = m;
  go("page-price");

  const res = await fetch(`/api/get-user-price?userId=${userId}&lessonType=${m}`);
  const data = await res.json();

  if(!data.ok){
    alert("料金未設定");
    return;
  }

  selectedPrice = data.price;
  document.getElementById("lesson-name").textContent = `${m}分`;
  document.getElementById("lesson-price").textContent = "$"+data.price;
}

function format(d){
  return d.toISOString().slice(0,10);
}

function toMin(t){
  const [h,m]=t.split(":").map(Number);
  return h*60+m;
}

function toTime(min){
  return String(Math.floor(min/60)).padStart(2,"0")+":"+String(min%60).padStart(2,"0");
}

async function showCalendar(){
  go("page-calendar");

  const busy = await fetch(GAS_URL).then(r=>r.json());

  const today = new Date();
  let days=[];
  for(let i=0;i<7;i++){
    let d=new Date(); d.setDate(today.getDate()+i);
    if(d.getDay()!=0) days.push(format(d));
  }

  let times=[];
  for(let h=7;h<=22;h++){
    ["00","15","30","45"].forEach(m=>times.push(`${String(h).padStart(2,"0")}:${m}`));
  }

  let html="<table class='calendar-table'><tr><th></th>";
  days.forEach(d=>html+=`<th>${d}</th>`);
  html+="</tr>";

  times.forEach(t=>{
    html+=`<tr><td>${t}</td>`;
    days.forEach(d=>{
      const tooSoon = new Date(d+"T"+t) - new Date() < 12*60*60*1000;

      const overlap = busy.some(b=>{
        if(b.date!=d) return false;
        return b.time==t;
      });

      if(!tooSoon && !overlap){
        html+=`<td class="available" onclick="pick('${d}','${t}')">○</td>`;
      }else{
        html+=`<td class="unavailable">×</td>`;
      }
    });
    html+="</tr>";
  });

  html+="</table>";
  document.getElementById("calendar").innerHTML=html;
}

function pick(d,t){
  selectedDate=d;
  selectedTime=t;

  document.getElementById("confirm").textContent =
    `${d} ${t} / ${selectedMinutes}分 / $${selectedPrice}`;

  go("page-confirm");
}

async function checkout(){
  localStorage.setItem("selectedDate",selectedDate);
  localStorage.setItem("selectedTime",selectedTime);
  localStorage.setItem("lessonType",selectedMinutes);
  localStorage.setItem("price",selectedPrice);

  const res = await fetch("/api/create-checkout-session",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      lessonType:selectedMinutes,
      selectedDate,
      selectedTime,
      userId
    })
  });

  const data = await res.json();
  window.location.href = data.url;
}

init();
</script>
</body>
</html>
