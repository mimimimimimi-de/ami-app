<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ami Lesson Booking</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      background: #f7f7f7;
      color: #222;
    }

    .container {
      max-width: 420px;
      margin: 0 auto;
    }

    .card {
      background: #fff;
      border-radius: 18px;
      padding: 24px 20px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
      margin-top: 20px;
    }

    h1, h2 {
      text-align: center;
    }

    p {
      font-size: 14px;
      line-height: 1.7;
      color: #666;
      text-align: center;
    }

    .hidden {
      display: none;
    }

    .lesson-button,
    .main-button,
    .sub-button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 12px;
    }

    .lesson-button,
    .main-button {
      background: #06C755;
      color: #fff;
    }

    .sub-button {
      background: #999;
      color: #fff;
    }

    .lesson-name {
      font-size: 22px;
      font-weight: bold;
      color: #06C755;
      text-align: center;
      margin-top: 8px;
    }

    .price {
      font-size: 30px;
      font-weight: bold;
      color: #06C755;
      text-align: center;
      margin: 16px 0 8px;
    }

    select {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #ccc;
      font-size: 16px;
      background: #fff;
      margin-top: 10px;
    }

    .info-box {
      background: #fafafa;
      border: 1px solid #eee;
      border-radius: 14px;
      padding: 14px;
      text-align: left;
      margin: 16px 0;
    }

    .info-row {
      margin-bottom: 10px;
      font-size: 15px;
      line-height: 1.6;
    }

    .status {
      margin-top: 14px;
      text-align: center;
      font-size: 14px;
      min-height: 20px;
      color: #06C755;
    }

    .error {
      color: #d93025;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="card" id="page-top">
      <h1>レッスンを選んでください</h1>
      <p>ご希望のレッスン時間を選んでください。</p>
      <button class="lesson-button" onclick="selectLesson(25)">25分レッスン</button>
      <button class="lesson-button" onclick="selectLesson(50)">50分レッスン</button>
    </div>

    <div class="card hidden" id="page-price">
      <h2>料金の確認</h2>
      <div class="lesson-name" id="lesson-name-price"></div>
      <div class="price" id="lesson-price"></div>
      <button class="sub-button" onclick="goToPage('page-top')">戻る</button>
      <button class="main-button" onclick="showDatePage()">次へ</button>
    </div>

    <div class="card hidden" id="page-date">
      <h2>日付を選んでください</h2>
      <p>今日以降の7日分から選べます。</p>
      <select id="date-select"></select>
      <button class="sub-button" onclick="goToPage('page-price')">戻る</button>
      <button class="main-button" onclick="showTimePage()">次へ</button>
    </div>

    <div class="card hidden" id="page-time">
      <h2>時間を選んでください</h2>
      <p>12時間前を過ぎた時間は表示されません。</p>
      <select id="time-select"></select>
      <p id="time-note"></p>
      <button class="sub-button" onclick="goToPage('page-date')">戻る</button>
      <button class="main-button" onclick="showConfirmPage()">次へ</button>
    </div>

    <div class="card hidden" id="page-confirm">
      <h2>予約内容の最終確認</h2>
      <div class="info-box">
        <div class="info-row"><strong>レッスン:</strong> <span id="confirm-lesson"></span></div>
        <div class="info-row"><strong>料金:</strong> <span id="confirm-price"></span></div>
        <div class="info-row"><strong>日付:</strong> <span id="confirm-date"></span></div>
        <div class="info-row"><strong>時間:</strong> <span id="confirm-time"></span></div>
      </div>

      <button class="sub-button" onclick="goToPage('page-time')">戻る</button>
      <button class="main-button" onclick="goToCheckout()">決済に進む</button>

      <div class="status" id="status-message"></div>
    </div>

  </div>

  <script>
    const LIFF_ID = "2009874208-p2dHU5i2";

    let selectedMinutes = null;
    let selectedPrice = null;
    let selectedDate = null;
    let selectedTime = null;

    const prices = {
      25: "$10",
      50: "$18"
    };

    const baseTimeSlots = [
      "09:00",
      "10:00",
      "11:00",
      "13:00",
      "14:00",
      "15:00",
      "16:00",
      "17:00",
      "18:00",
      "19:00",
      "20:00"
    ];

    async function initializeLiff() {
      try {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }
      } catch (error) {
        console.error("LIFF init error:", error);
      }
    }

    function hideAllPages() {
      document.getElementById("page-top").classList.add("hidden");
      document.getElementById("page-price").classList.add("hidden");
      document.getElementById("page-date").classList.add("hidden");
      document.getElementById("page-time").classList.add("hidden");
      document.getElementById("page-confirm").classList.add("hidden");
    }

    function goToPage(pageId) {
      hideAllPages();
      document.getElementById(pageId).classList.remove("hidden");
      setStatus("");
    }

    function setStatus(message, isError = false) {
      const el = document.getElementById("status-message");
      if (!el) return;
      el.textContent = message;
      el.className = isError ? "status error" : "status";
    }

    function selectLesson(minutes) {
      selectedMinutes = minutes;
      selectedPrice = prices[minutes];
      document.getElementById("lesson-name-price").textContent = `${minutes}分レッスン`;
      document.getElementById("lesson-price").textContent = selectedPrice;
      goToPage("page-price");
    }

    function showDatePage() {
      generateDateOptions();
      goToPage("page-date");
    }

    function generateDateOptions() {
      const select = document.getElementById("date-select");
      select.innerHTML = "";

      const today = new Date();

      for (let i = 0; i < 7; i++) {
        const d = new Date();
        d.setDate(today.getDate() + i);

        const year = d.getFullYear();
        const month = String(d.getMonth() + 1).padStart(2, "0");
        const day = String(d.getDate()).padStart(2, "0");

        const option = document.createElement("option");
        option.value = `${year}-${month}-${day}`;
        option.textContent = `${year}-${month}-${day}`;
        select.appendChild(option);
      }
    }

    function showTimePage() {
      selectedDate = document.getElementById("date-select").value;
      generateTimeOptions(selectedDate);
      goToPage("page-time");
    }

    function generateTimeOptions(dateString) {
      const select = document.getElementById("time-select");
      const note = document.getElementById("time-note");
      select.innerHTML = "";

      const now = new Date();
      const availableSlots = [];

      baseTimeSlots.forEach(time => {
        const [hour, minute] = time.split(":").map(Number);
        const lessonDateTime = new Date(`${dateString}T${String(hour).padStart(2, "0")}:${String(minute).padStart(2, "0")}:00`);
        const diffMs = lessonDateTime.getTime() - now.getTime();
        const diffHours = diffMs / (1000 * 60 * 60);

        if (diffHours >= 12) {
          availableSlots.push(time);
        }
      });

      if (availableSlots.length === 0) {
        const option = document.createElement("option");
        option.value = "";
        option.textContent = "選べる時間がありません";
        select.appendChild(option);
        note.textContent = "この日は12時間前ルールにより選択できる時間がありません。";
        return;
      }

      availableSlots.forEach(time => {
        const option = document.createElement("option");
        option.value = time;
        option.textContent = time;
        select.appendChild(option);
      });

      note.textContent = `${dateString} の予約可能時間です。`;
    }

    function showConfirmPage() {
      selectedDate = document.getElementById("date-select").value;
      selectedTime = document.getElementById("time-select").value;

      if (!selectedTime) {
        alert("選べる時間がありません。別の日付を選んでください。");
        return;
      }

      document.getElementById("confirm-lesson").textContent = `${selectedMinutes}分レッスン`;
      document.getElementById("confirm-price").textContent = selectedPrice;
      document.getElementById("confirm-date").textContent = selectedDate;
      document.getElementById("confirm-time").textContent = selectedTime;

      goToPage("page-confirm");
    }

    async function goToCheckout() {
      try {
        setStatus("");

        const response = await fetch("/api/create-checkout-session", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            lessonType: selectedMinutes,
            selectedDate,
            selectedTime,
          }),
        });

        const data = await response.json();

        if (!response.ok) {
          setStatus("決済ページを開けませんでした。", true);
          return;
        }

        window.location.href = data.url;
      } catch (error) {
        console.error(error);
        setStatus("エラーが発生しました。", true);
      }
    }

    initializeLiff();
  </script>
</body>
</html>
