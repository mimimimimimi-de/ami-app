<!DOCTYPE html>

<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ami Lesson Booking</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      background: #f7f7f7;
      color: #222;
    }
    .container { max-width: 420px; margin: 0 auto; }
    .card {
      background: #fff;
      border-radius: 18px;
      padding: 24px 20px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
      margin-top: 20px;
    }
    h1, h2 { text-align: center; }
    p { font-size: 14px; line-height: 1.7; color: #666; text-align: center; }
    .hidden { display: none; }

```
.lesson-button, .main-button, .sub-button {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  cursor: pointer;
  margin-top: 12px;
}
.lesson-button, .main-button { background: #06C755; color: #fff; }
.sub-button { background: #999; color: #fff; }

.lesson-name {
  font-size: 22px;
  font-weight: bold;
  color: #06C755;
  text-align: center;
  margin-top: 8px;
}
.price {
  font-size: 30px;
  font-weight: bold;
  color: #06C755;
  text-align: center;
  margin: 16px 0 8px;
}

select {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid #ccc;
  font-size: 16px;
  background: #fff;
  margin-top: 10px;
}

.info-box {
  background: #fafafa;
  border: 1px solid #eee;
  border-radius: 14px;
  padding: 14px;
  text-align: left;
  margin: 16px 0;
}

.info-row { margin-bottom: 10px; font-size: 15px; line-height: 1.6; }

.status {
  margin-top: 14px;
  text-align: center;
  font-size: 14px;
  min-height: 20px;
  color: #06C755;
  white-space: pre-line;
}

.error { color: #d93025; }

/* 🔥追加：キャンセルポリシー */
.policy-box {
  margin: 16px 0;
  padding: 14px;
  background: #fff8f0;
  border: 1px solid #f3c98b;
  border-radius: 12px;
  font-size: 13px;
  line-height: 1.6;
}
.policy-box h3 {
  margin: 0 0 6px;
  font-size: 14px;
  color: #8a5a00;
}
.policy-box p {
  margin: 4px 0;
}

</head>

<body>
<div class="container">

  <div class="card" id="page-top">
    <h1>レッスンを選んでください</h1>
    <p>ご希望のレッスン時間を選んでください。</p>
    <button class="lesson-button" onclick="selectLesson(25)">25分レッスン</button>
    <button class="lesson-button" onclick="selectLesson(50)">50分レッスン</button>
  </div>

  <div class="card hidden" id="page-price">
    <h2>料金の確認</h2>
    <div class="lesson-name" id="lesson-name-price"></div>
    <div class="price" id="lesson-price"></div>
    <button class="sub-button" onclick="goToPage('page-top')">戻る</button>
    <button class="main-button" onclick="showDatePage()">次へ</button>
  </div>

  <div class="card hidden" id="page-date">
    <h2>日付を選んでください</h2>
    <p>日曜日はお休みです。予約は12時間前まで可能です。</p>
    <select id="date-select"></select>
    <button class="sub-button" onclick="goToPage('page-price')">戻る</button>
    <button class="main-button" onclick="showTimePage()">次へ</button>
  </div>

  <div class="card hidden" id="page-time">
    <h2>時間を選んでください</h2>
    <p>15分単位で選べます。</p>
    <select id="time-select"></select>
    <p id="time-note"></p>
    <button class="sub-button" onclick="goToPage('page-date')">戻る</button>
    <button class="main-button" onclick="showConfirmPage()">次へ</button>
  </div>

  <!-- 🔥ここにポリシー追加 -->

  <div class="card hidden" id="page-confirm">
    <h2>予約内容の最終確認</h2>

```
<div class="info-box">
  <div class="info-row"><strong>レッスン:</strong> <span id="confirm-lesson"></span></div>
  <div class="info-row"><strong>料金:</strong> <span id="confirm-price"></span></div>
  <div class="info-row"><strong>日付:</strong> <span id="confirm-date"></span></div>
  <div class="info-row"><strong>時間:</strong> <span id="confirm-time"></span></div>
</div>

<div class="policy-box">
  <h3>キャンセルについて</h3>
  <p>レッスン開始12時間前までのキャンセルは、決済手数料を差し引いた金額を返金いたします。</p>
  <p>12時間前を過ぎた場合は返金できません。</p>
  <p>ご予約前に必ずご確認ください。</p>
</div>

<button class="sub-button" onclick="goToPage('page-time')">戻る</button>
<button class="main-button" onclick="goToCheckout()">決済に進む</button>
<div class="status" id="status-message"></div>
