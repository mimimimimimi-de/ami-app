<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ami Lesson Booking</title>

  <!-- LIFF SDK -->
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding: 40px;
    }
    button {
      padding: 15px 20px;
      margin: 10px;
      font-size: 16px;
      border-radius: 10px;
      border: none;
      background-color: #06C755;
      color: white;
    }
  </style>
</head>

<body>

  <h1>レッスン予約</h1>

  <button onclick="selectPlan('25分レッスン / $10')">25分レッスン</button>
  <button onclick="selectPlan('50分レッスン / $20')">50分レッスン</button>

  <script>
    const LIFF_ID = "2009874208-p2dHU5i2";

    async function initLIFF() {
      await liff.init({ liffId: LIFF_ID });

      if (!liff.isLoggedIn()) {
        liff.login();
      }
    }

    function selectPlan(plan) {
      const message = `予約内容\n${plan}\n日時を教えてください`;

      liff.shareTargetPicker([
        {
          type: "text",
          text: message
        }
      ]);
    }

    initLIFF();
  </script>

</body>
</html>
