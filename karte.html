<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生徒カルテ - Ami Lesson</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green: #06C755; --green-light: #e8faf0; --green-dark: #04a344;
  --gray-bg: #f5f6f7; --gray-border: #e8e8e8; --gray-text: #888;
  --text: #1a1a1a; --card-shadow: 0 2px 12px rgba(0,0,0,0.07);
}
body { font-family: "Noto Sans JP", -apple-system, sans-serif; background: var(--gray-bg); color: var(--text); font-size: 14px; min-height: 100vh; }

.header { background: #fff; border-bottom: 2px solid var(--green); padding: 0 20px; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; height: 56px; }
.header-title { font-size: 18px; font-weight: 700; color: var(--green); }
.back-btn { background: var(--green-light); color: var(--green); border: none; border-radius: 8px; padding: 8px 14px; font-size: 13px; font-weight: 600; cursor: pointer; }

.container { max-width: 900px; margin: 0 auto; padding: 16px; }

/* 生徒リスト */
.search-box { background: #fff; border-radius: 12px; padding: 10px 14px; margin-bottom: 14px; box-shadow: var(--card-shadow); display: flex; gap: 10px; align-items: center; }
.search-box input { border: none; outline: none; font-size: 14px; width: 100%; background: transparent; }

.student-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
.student-card { background: #fff; border-radius: 14px; padding: 14px 16px; box-shadow: var(--card-shadow); display: flex; align-items: center; gap: 14px; cursor: pointer; border: 2px solid transparent; transition: all 0.15s; }
.student-card:hover { border-color: var(--green-light); }
.student-card.active { border-color: var(--green); }
.avatar { width: 44px; height: 44px; border-radius: 50%; background: var(--green-light); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.student-info { flex: 1; min-width: 0; }
.student-name { font-size: 15px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.student-meta { font-size: 11px; color: var(--gray-text); margin-top: 2px; }
.level-badge { background: var(--green-light); color: var(--green); font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }

/* カルテ詳細 */
.karte { background: #fff; border-radius: 16px; box-shadow: var(--card-shadow); overflow: hidden; display: none; }
.karte.show { display: block; }
.karte-header { background: linear-gradient(135deg, var(--green), var(--green-dark)); padding: 20px; color: #fff; }
.karte-name { font-size: 22px; font-weight: 700; }
.karte-sub { font-size: 12px; opacity: 0.85; margin-top: 4px; }
.karte-badges { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
.karte-badge { background: rgba(255,255,255,0.25); border-radius: 20px; padding: 4px 10px; font-size: 11px; }

.karte-tabs { display: flex; border-bottom: 1px solid #f0f0f0; }
.karte-tab { flex: 1; padding: 12px 8px; text-align: center; font-size: 13px; font-weight: 600; color: #aaa; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; }
.karte-tab.active { color: var(--green); border-bottom-color: var(--green); }

.karte-body { padding: 16px; }

/* 基本情報 */
.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.info-item { }
.info-label { font-size: 11px; color: #999; margin-bottom: 4px; font-weight: 600; }
.info-val { font-size: 13px; font-weight: 600; color: #333; }
.info-full { grid-column: 1 / -1; }
.info-text { font-size: 13px; color: #333; line-height: 1.7; background: #f8f8f8; border-radius: 8px; padding: 10px 12px; }

/* 編集フォーム */
.edit-form { display: none; }
.edit-form.show { display: block; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
.form-field { display: flex; flex-direction: column; gap: 4px; }
.form-field.full { grid-column: 1 / -1; }
.form-field label { font-size: 11px; color: #999; font-weight: 600; }
.form-field input, .form-field select, .form-field textarea { border: 1.5px solid var(--gray-border); border-radius: 8px; padding: 8px 10px; font-size: 13px; font-family: inherit; outline: none; transition: border-color 0.15s; }
.form-field input:focus, .form-field select:focus, .form-field textarea:focus { border-color: var(--green); }
.form-actions { display: flex; gap: 10px; }
.save-btn { flex: 1; background: var(--green); color: #fff; border: none; border-radius: 10px; padding: 12px; font-size: 14px; font-weight: 700; cursor: pointer; }
.cancel-btn { background: #f0f0f0; color: #555; border: none; border-radius: 10px; padding: 12px 20px; font-size: 14px; font-weight: 600; cursor: pointer; }
.edit-btn { width: 100%; background: var(--green-light); color: var(--green); border: none; border-radius: 10px; padding: 11px; font-size: 13px; font-weight: 700; cursor: pointer; margin-top: 14px; }

/* レッスン記録 */
.lesson-list { display: flex; flex-direction: column; gap: 10px; }
.lesson-item { border: 1px solid #f0f0f0; border-radius: 12px; padding: 12px 14px; }
.lesson-date { font-size: 12px; color: var(--green); font-weight: 700; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
.lesson-type-badge { background: #f0f0f0; color: #666; font-size: 10px; border-radius: 10px; padding: 2px 8px; }
.lesson-section { margin-top: 6px; }
.lesson-section-label { font-size: 10px; color: #aaa; margin-bottom: 2px; }
.lesson-section-val { font-size: 12px; color: #333; line-height: 1.6; }

.tab-content { display: none; }
.tab-content.show { display: block; }
.loading { text-align: center; padding: 40px; color: var(--gray-text); }
.empty { text-align: center; padding: 30px; color: var(--gray-text); font-size: 13px; }
.save-status { font-size: 12px; text-align: center; margin-top: 8px; min-height: 18px; }
.save-status.ok { color: var(--green); }
.save-status.err { color: #d93025; }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">👥 生徒カルテ</div>
  <button class="back-btn" onclick="window.location.href='admin.html'">← 管理画面</button>
</div>

<div class="container">

  <div class="search-box">
    <span>🔍</span>
    <input type="text" id="searchInput" placeholder="名前で検索..." oninput="renderStudents()">
  </div>

  <div class="student-list" id="studentList">
    <div class="loading">読み込み中...</div>
  </div>

  <div class="karte" id="karteDetail">
    <div class="karte-header">
      <div class="karte-name" id="karteName">-</div>
      <div class="karte-sub" id="karteSub">-</div>
      <div class="karte-badges" id="karteBadges"></div>
    </div>
    <div class="karte-tabs">
      <div class="karte-tab active" onclick="switchKarteTab('basic', this)">📋 基本情報</div>
      <div class="karte-tab" onclick="switchKarteTab('lessons', this)">📚 レッスン記録</div>
    </div>
    <div class="karte-body">

      <!-- 基本情報表示 -->
      <div id="tab-basic" class="tab-content show">
        <div class="info-grid" id="basicInfoGrid"></div>
        <button class="edit-btn" onclick="showEditForm()">✏️ 編集する</button>
      </div>

      <!-- 基本情報編集フォーム -->
      <div id="editForm" class="edit-form">
        <div class="form-grid">
          <div class="form-field"><label>誕生日</label><input type="text" id="f_birthday" placeholder="例：1995年3月12日"></div>
          <div class="form-field"><label>性別</label><select id="f_gender"><option value="">-</option><option>女性</option><option>男性</option><option>その他</option></select></div>
          <div class="form-field"><label>出身地</label><input type="text" id="f_origin" placeholder="例：バンコク"></div>
          <div class="form-field"><label>職業</label><input type="text" id="f_job" placeholder="例：会社員"></div>
          <div class="form-field"><label>日本語レベル</label><select id="f_level"><option value="">-</option><option>初心者</option><option>N5</option><option>N4</option><option>N3</option><option>N2</option><option>N1</option></select></div>
          <div class="form-field"><label>学習開始</label><input type="text" id="f_start" placeholder="例：2024年1月"></div>
          <div class="form-field"><label>授業頻度</label><input type="text" id="f_frequency" placeholder="例：週1回"></div>
          <div class="form-field"><label>趣味</label><input type="text" id="f_hobby" placeholder="例：旅行・アニメ"></div>
          <div class="form-field full"><label>日本語を学ぶ目的</label><textarea id="f_purpose" rows="2" placeholder="例：日本に旅行したい"></textarea></div>
          <div class="form-field full"><label>普段の勉強方法</label><input type="text" id="f_method" placeholder="例：アプリ・YouTube"></div>
          <div class="form-field full"><label>レッスンでやりたいこと</label><textarea id="f_want" rows="2" placeholder="例：会話練習をメインにしたい"></textarea></div>
          <div class="form-field full"><label>その他要望・メモ</label><textarea id="f_memo" rows="2" placeholder="例：敬語が苦手"></textarea></div>
        </div>
        <div class="form-actions">
          <button class="cancel-btn" onclick="hideEditForm()">キャンセル</button>
          <button class="save-btn" onclick="saveKarte()">保存する</button>
        </div>
        <div class="save-status" id="saveStatus"></div>
      </div>

      <!-- レッスン記録 -->
      <div id="tab-lessons" class="tab-content">

        <!-- 追加フォーム -->
        <div style="background:#f8fdf9;border:1px solid #d7f3df;border-radius:14px;padding:14px;margin-bottom:14px;">
          <div style="font-size:13px;font-weight:700;color:#06C755;margin-bottom:10px;">➕ レッスン記録を追加</div>
          <div style="margin-bottom:8px;">
            <div style="font-size:11px;color:#999;font-weight:600;margin-bottom:4px;">日付</div>
            <input type="text" id="logDate" style="width:100%;padding:9px 11px;border:1.5px solid #e8e8e8;border-radius:9px;font-size:13px;font-family:inherit;outline:none;">
          </div>
          <div style="margin-bottom:8px;">
            <div style="font-size:11px;color:#999;font-weight:600;margin-bottom:4px;">レッスン内容</div>
            <textarea id="logContent" rows="2" placeholder="例：て形・た形 / みんなの日本語 p.45〜48" style="width:100%;padding:9px 11px;border:1.5px solid #e8e8e8;border-radius:9px;font-size:13px;font-family:inherit;resize:vertical;outline:none;"></textarea>
          </div>
          <div style="margin-bottom:10px;">
            <div style="font-size:11px;color:#999;font-weight:600;margin-bottom:4px;">メモ</div>
            <textarea id="logMemo" rows="2" placeholder="例：動詞グループが難しそう。次回も復習する。" style="width:100%;padding:9px 11px;border:1.5px solid #e8e8e8;border-radius:9px;font-size:13px;font-family:inherit;resize:vertical;outline:none;"></textarea>
          </div>
          <button onclick="addLessonLog()" style="width:100%;background:#06C755;color:#fff;border:none;border-radius:10px;padding:11px;font-size:13px;font-weight:700;cursor:pointer;" id="logAddBtn">保存する</button>
          <div id="logAddStatus" style="font-size:12px;text-align:center;margin-top:6px;min-height:16px;"></div>
        </div>

        <!-- 記録リスト -->
        <div class="lesson-list" id="lessonList">
          <div class="empty">レッスン記録はありません</div>
        </div>
      </div>

    </div>
  </div>

</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbzRX0UZSwDW3h9V7tUGA1grjhNlfU9e60H4hGzABbAJl0cWn40VFwy4D2mY-vgEvSY/exec";
let allUsers = [];
let allKartes = {};
let allLessons = {};
let selectedUserId = null;

async function loadAll() {
  try {
    const [usersRes, kartesRes] = await Promise.all([
      fetch(GAS_URL + "?action=getUsers&t=" + Date.now()),
      fetch(GAS_URL + "?action=getKartes&t=" + Date.now())
    ]);
    const usersData = await usersRes.json();
    const kartesData = await kartesRes.json();
    allUsers = usersData.ok ? usersData.users : [];
    if (kartesData.ok) {
      kartesData.kartes.forEach(k => { allKartes[k.userId] = k; });
    }
    renderStudents();
    // URLパラメータで生徒指定
    const params = new URLSearchParams(window.location.search);
    const uid = params.get("userId");
    if (uid) selectStudent(uid);
  } catch(e) {
    document.getElementById("studentList").innerHTML = '<div class="empty">読み込みに失敗しました</div>';
  }
}

function renderStudents() {
  const q = document.getElementById("searchInput").value.toLowerCase();
  const filtered = allUsers.filter(u => u.name.toLowerCase().includes(q));
  const list = document.getElementById("studentList");
  if (!filtered.length) { list.innerHTML = '<div class="empty">生徒が見つかりません</div>'; return; }
  list.innerHTML = filtered.map(u => {
    const k = allKartes[u.userId] || {};
    const level = k.level || '-';
    const lastLesson = allLessons[u.userId] ? allLessons[u.userId][0]?.date || '-' : '-';
    return `<div class="student-card ${selectedUserId === u.userId ? 'active' : ''}" onclick="selectStudent('${u.userId}')">
      <div class="avatar">👤</div>
      <div class="student-info">
        <div class="student-name">${escHtml(u.name)}</div>
        <div class="student-meta">${k.origin ? '📍 ' + escHtml(k.origin) + ' &nbsp;|&nbsp; ' : ''}最終レッスン: ${escHtml(lastLesson)}</div>
      </div>
      <span class="level-badge">${escHtml(level)}</span>
    </div>`;
  }).join('');
}

async function selectStudent(userId) {
  selectedUserId = userId;
  renderStudents();
  const user = allUsers.find(u => u.userId === userId);
  if (!user) return;
  const k = allKartes[userId] || {};
  document.getElementById("karteName").textContent = user.name;
  document.getElementById("karteSub").textContent = [k.origin, k.frequency, k.job].filter(Boolean).join(' | ') || '情報未登録';
  const badges = [k.level, k.start ? k.start + 'から学習' : '', k.purpose ? k.purpose.substring(0,10) + '...' : ''].filter(Boolean);
  document.getElementById("karteBadges").innerHTML = badges.map(b => `<span class="karte-badge">${escHtml(b)}</span>`).join('');
  renderBasicInfo(k);
  hideEditForm();
  document.getElementById("karteDetail").classList.add("show");
  setTodayDate();
  // レッスン記録を取得
  try {
    const res = await fetch(GAS_URL + "?action=getLessonLogs&userId=" + encodeURIComponent(userId) + "&t=" + Date.now());
    const data = await res.json();
    allLessons[userId] = data.ok ? data.logs : [];
    renderLessonLogs(data.ok ? data.logs : []);
  } catch(e) { renderLessonLogs([]); }
  switchKarteTab('basic', document.querySelector('.karte-tab'));
}

function renderBasicInfo(k) {
  const fields = [
    { label: '誕生日', val: k.birthday, full: false },
    { label: '性別', val: k.gender, full: false },
    { label: '出身地', val: k.origin, full: false },
    { label: '職業', val: k.job, full: false },
    { label: '日本語レベル', val: k.level, full: false },
    { label: '学習開始', val: k.start, full: false },
    { label: '授業頻度', val: k.frequency, full: false },
    { label: '趣味', val: k.hobby, full: true },
    { label: '日本語を学ぶ目的', val: k.purpose, full: true, isText: true },
    { label: '普段の勉強方法', val: k.method, full: true },
    { label: 'レッスンでやりたいこと', val: k.want, full: true, isText: true },
    { label: 'その他要望・メモ', val: k.memo, full: true, isText: true },
  ];
  document.getElementById("basicInfoGrid").innerHTML = fields.map(f => f.val ? `
    <div class="info-item ${f.full ? 'info-full' : ''}">
      <div class="info-label">${f.label}</div>
      ${f.isText ? `<div class="info-text">${escHtml(f.val)}</div>` : `<div class="info-val">${escHtml(f.val)}</div>`}
    </div>` : '').join('') || '<div class="empty" style="grid-column:1/-1">まだ情報が登録されていません<br><br></div>';
}

function renderLessonLogs(logs) {
  const el = document.getElementById("lessonList");
  if (!logs.length) { el.innerHTML = '<div class="empty">レッスン記録はありません</div>'; return; }
  el.innerHTML = logs.map((log, idx) => `
    <div class="lesson-item">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <div style="font-size:13px;font-weight:700;color:#06C755;">${escHtml(log.date)}</div>
        <button onclick="deleteLessonLog(${idx})" style="background:none;border:none;color:#ccc;font-size:16px;cursor:pointer;padding:0 4px;">🗑</button>
      </div>
      ${log.content ? `<div style="font-size:10px;color:#aaa;font-weight:600;margin-bottom:2px;">📖 レッスン内容</div>
      <div style="font-size:13px;color:#333;line-height:1.6;margin-bottom:8px;">${escHtml(log.content)}</div>` : ''}
      ${log.memo ? `<div style="font-size:10px;color:#aaa;font-weight:600;margin-bottom:2px;">📝 メモ</div>
      <div style="font-size:12px;color:#777;line-height:1.6;background:#f8f8f8;border-radius:8px;padding:8px 10px;">${escHtml(log.memo)}</div>` : ''}
    </div>`).join('');
}

// 今日の日付をセット
function setTodayDate() {
  const today = new Date();
  const y = today.getFullYear();
  const m = String(today.getMonth() + 1).padStart(2, '0');
  const d = String(today.getDate()).padStart(2, '0');
  const el = document.getElementById("logDate");
  if (el && !el.value) el.value = `${y}-${m}-${d}`;
}

async function addLessonLog() {
  if (!selectedUserId) return;
  const date = document.getElementById("logDate").value.trim();
  const content = document.getElementById("logContent").value.trim();
  const memo = document.getElementById("logMemo").value.trim();
  if (!date && !content && !memo) { alert("内容を入力してください。"); return; }
  const btn = document.getElementById("logAddBtn");
  const statusEl = document.getElementById("logAddStatus");
  btn.disabled = true;
  btn.textContent = "保存中...";
  statusEl.textContent = "";
  try {
    const params = new URLSearchParams({ action: "addLessonLog", userId: selectedUserId, date, content, memo, t: Date.now() });
    const res = await fetch(GAS_URL + "?" + params.toString());
    const data = await res.json();
    if (data.ok) {
      statusEl.textContent = "✅ 保存しました";
      statusEl.style.color = "#06C755";
      document.getElementById("logContent").value = "";
      document.getElementById("logMemo").value = "";
      // リストを再取得
      const res2 = await fetch(GAS_URL + "?action=getLessonLogs&userId=" + encodeURIComponent(selectedUserId) + "&t=" + Date.now());
      const data2 = await res2.json();
      allLessons[selectedUserId] = data2.ok ? data2.logs : [];
      renderLessonLogs(allLessons[selectedUserId]);
      renderStudents();
    } else {
      statusEl.textContent = "⚠️ " + (data.message || "失敗しました");
      statusEl.style.color = "#d93025";
    }
  } catch(e) {
    statusEl.textContent = "エラーが発生しました";
    statusEl.style.color = "#d93025";
  }
  btn.disabled = false;
  btn.textContent = "保存する";
}

async function deleteLessonLog(idx) {
  if (!selectedUserId) return;
  if (!confirm("この記録を削除しますか？")) return;
  try {
    const params = new URLSearchParams({ action: "deleteLessonLog", userId: selectedUserId, idx, t: Date.now() });
    const res = await fetch(GAS_URL + "?" + params.toString());
    const data = await res.json();
    if (data.ok) {
      const res2 = await fetch(GAS_URL + "?action=getLessonLogs&userId=" + encodeURIComponent(selectedUserId) + "&t=" + Date.now());
      const data2 = await res2.json();
      allLessons[selectedUserId] = data2.ok ? data2.logs : [];
      renderLessonLogs(allLessons[selectedUserId]);
    }
  } catch(e) {}
}

function showEditForm() {
  const k = allKartes[selectedUserId] || {};
  document.getElementById("f_birthday").value = k.birthday || '';
  document.getElementById("f_gender").value = k.gender || '';
  document.getElementById("f_origin").value = k.origin || '';
  document.getElementById("f_job").value = k.job || '';
  document.getElementById("f_level").value = k.level || '';
  document.getElementById("f_start").value = k.start || '';
  document.getElementById("f_frequency").value = k.frequency || '';
  document.getElementById("f_hobby").value = k.hobby || '';
  document.getElementById("f_purpose").value = k.purpose || '';
  document.getElementById("f_method").value = k.method || '';
  document.getElementById("f_want").value = k.want || '';
  document.getElementById("f_memo").value = k.memo || '';
  document.getElementById("tab-basic").querySelector('.info-grid').style.display = 'none';
  document.getElementById("tab-basic").querySelector('.edit-btn').style.display = 'none';
  document.getElementById("editForm").classList.add("show");
  document.getElementById("saveStatus").textContent = '';
}

function hideEditForm() {
  document.getElementById("editForm").classList.remove("show");
  const grid = document.getElementById("tab-basic").querySelector('.info-grid');
  const btn = document.getElementById("tab-basic").querySelector('.edit-btn');
  if (grid) grid.style.display = '';
  if (btn) btn.style.display = '';
}

async function saveKarte() {
  if (!selectedUserId) return;
  const karte = {
    userId: selectedUserId,
    birthday: document.getElementById("f_birthday").value.trim(),
    gender: document.getElementById("f_gender").value,
    origin: document.getElementById("f_origin").value.trim(),
    job: document.getElementById("f_job").value.trim(),
    level: document.getElementById("f_level").value,
    start: document.getElementById("f_start").value.trim(),
    frequency: document.getElementById("f_frequency").value.trim(),
    hobby: document.getElementById("f_hobby").value.trim(),
    purpose: document.getElementById("f_purpose").value.trim(),
    method: document.getElementById("f_method").value.trim(),
    want: document.getElementById("f_want").value.trim(),
    memo: document.getElementById("f_memo").value.trim(),
  };
  const statusEl = document.getElementById("saveStatus");
  statusEl.textContent = "保存中...";
  statusEl.className = "save-status";
  try {
    const res = await fetch(GAS_URL + "?action=saveKarte&" + new URLSearchParams(karte).toString() + "&t=" + Date.now());
    const data = await res.json();
    if (data.ok) {
      allKartes[selectedUserId] = karte;
      renderBasicInfo(karte);
      hideEditForm();
      statusEl.textContent = "✅ 保存しました";
      statusEl.className = "save-status ok";
      const user = allUsers.find(u => u.userId === selectedUserId);
      const badges = [karte.level, karte.start ? karte.start + 'から学習' : '', karte.purpose ? karte.purpose.substring(0,10) + '...' : ''].filter(Boolean);
      document.getElementById("karteBadges").innerHTML = badges.map(b => `<span class="karte-badge">${escHtml(b)}</span>`).join('');
      document.getElementById("karteSub").textContent = [karte.origin, karte.frequency, karte.job].filter(Boolean).join(' | ') || '情報未登録';
      renderStudents();
    } else {
      statusEl.textContent = "⚠️ " + (data.message || "保存に失敗しました");
      statusEl.className = "save-status err";
    }
  } catch(e) {
    statusEl.textContent = "エラーが発生しました";
    statusEl.className = "save-status err";
  }
}

function switchKarteTab(name, btn) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('show'));
  document.querySelectorAll('.karte-tab').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('show');
  if (btn) btn.classList.add('active');
  else document.querySelectorAll('.karte-tab')[name === 'basic' ? 0 : 1].classList.add('active');
}

function escHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

loadAll();
</script>
