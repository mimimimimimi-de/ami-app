<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マイ予約</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --green: #06C755;
  --green2: #04a344;
  --green-glow: rgba(6,199,85,0.18);
  --bg: #0f1a14;
  --bg2: #162019;
  --card: #1a2a1e;
  --card2: #1f3224;
  --border: rgba(6,199,85,0.15);
  --text: #e8f5ec;
  --text2: #8aad92;
  --red: #ff4d4d;
  --red-bg: rgba(255,77,77,0.1);
  --yellow: #ffd166;
  --yellow-bg: rgba(255,209,102,0.1);
}

html { scroll-behavior: smooth; }

body {
  font-family: 'Noto Sans JP', 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* 背景装飾 */
body::before {
  content: '';
  position: fixed;
  top: -200px;
  right: -200px;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(6,199,85,0.07) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

body::after {
  content: '';
  position: fixed;
  bottom: -150px;
  left: -150px;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(6,199,85,0.05) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* ヘッダー */
.header {
  position: sticky;
  top: 0;
  z-index: 50;
  background: rgba(15,26,20,0.85);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.header-icon {
  width: 36px;
  height: 36px;
  background: var(--green);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}

.header-text h1 {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.02em;
}

.header-text p {
  font-size: 12px;
  color: var(--text2);
  margin-top: 1px;
}

/* コンテンツ */
.content {
  position: relative;
  z-index: 1;
  max-width: 480px;
  margin: 0 auto;
  padding: 20px 16px 40px;
}

/* プロフィールバー */
.profile-bar {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 16px 18px;
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 20px;
  opacity: 0;
  transform: translateY(10px);
  animation: fadeUp 0.4s ease forwards;
}

.avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--green), var(--green2));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
  overflow: hidden;
}

.avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.profile-info .name {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
}

.profile-info .sub {
  font-size: 12px;
  color: var(--text2);
  margin-top: 2px;
}

/* サマリー */
.summary-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 24px;
  opacity: 0;
  transform: translateY(10px);
  animation: fadeUp 0.4s ease 0.1s forwards;
}

.stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 16px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--green), transparent);
}

.stat-card .num {
  font-size: 28px;
  font-weight: 700;
  font-family: 'DM Sans', sans-serif;
  color: var(--green);
  line-height: 1;
}

.stat-card .label {
  font-size: 11px;
  color: var(--text2);
  margin-top: 4px;
  letter-spacing: 0.03em;
}

/* タブ */
.tabs {
  display: flex;
  gap: 6px;
  margin-bottom: 16px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 5px;
  opacity: 0;
  animation: fadeUp 0.4s ease 0.15s forwards;
}

.tab {
  flex: 1;
  padding: 9px 8px;
  border-radius: 10px;
  border: none;
  background: transparent;
  color: var(--text2);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
}

.tab.active {
  background: var(--green);
  color: #fff;
  box-shadow: 0 4px 12px var(--green-glow);
}

/* 予約リスト */
.list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* 予約カード */
.res-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  overflow: hidden;
  opacity: 0;
  transform: translateY(16px);
  animation: fadeUp 0.4s ease forwards;
  transition: box-shadow 0.2s;
}

.res-card:hover {
  box-shadow: 0 8px 32px rgba(6,199,85,0.1);
}

.res-card.upcoming {
  border-color: rgba(6,199,85,0.3);
}

.res-card.past {
  opacity: 0.6;
}

.res-card.cancelled {
  border-color: rgba(255,77,77,0.2);
}

/* カードトップバー */
.card-top {
  padding: 14px 16px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}

.lesson-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(6,199,85,0.12);
  border: 1px solid rgba(6,199,85,0.25);
  color: var(--green);
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 700;
}

.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
}

.status-badge.upcoming {
  background: var(--yellow-bg);
  color: var(--yellow);
  border: 1px solid rgba(255,209,102,0.25);
}

.status-badge.confirmed {
  background: rgba(6,199,85,0.1);
  color: var(--green);
  border: 1px solid var(--border);
}

.status-badge.cancelled {
  background: var(--red-bg);
  color: var(--red);
  border: 1px solid rgba(255,77,77,0.2);
}

.status-badge.past {
  background: rgba(138,173,146,0.1);
  color: var(--text2);
  border: 1px solid rgba(138,173,146,0.15);
}

/* カード本体 */
.card-body {
  padding: 14px 16px;
}

.datetime-row {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin-bottom: 10px;
}

.datetime-date {
  font-size: 22px;
  font-weight: 700;
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  letter-spacing: -0.02em;
}

.datetime-time {
  font-size: 15px;
  color: var(--text2);
  font-weight: 500;
}

.datetime-day {
  font-size: 12px;
  color: var(--text2);
  background: var(--card2);
  padding: 2px 8px;
  border-radius: 6px;
}

.detail-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 13px;
  color: var(--text2);
}

.price-text {
  font-size: 15px;
  font-weight: 700;
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
}

/* Meetリンク */
.meet-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin: 12px 0 0;
  padding: 11px;
  background: rgba(66,133,244,0.12);
  border: 1px solid rgba(66,133,244,0.25);
  border-radius: 12px;
  color: #7aabff;
  font-size: 13px;
  font-weight: 600;
  text-decoration: none;
  transition: all 0.2s;
}

.meet-btn:hover {
  background: rgba(66,133,244,0.2);
}

/* カードフッター（変更・キャンセル） */
.card-footer {
  padding: 0 16px 14px;
  display: flex;
  gap: 8px;
}

.action-btn {
  flex: 1;
  padding: 9px;
  border-radius: 12px;
  border: none;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  text-decoration: none;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  transition: all 0.2s;
}

.action-btn.change {
  background: rgba(6,199,85,0.1);
  border: 1px solid rgba(6,199,85,0.25);
  color: var(--green);
}

.action-btn.change:hover {
  background: rgba(6,199,85,0.2);
}

.action-btn.cancel {
  background: var(--red-bg);
  border: 1px solid rgba(255,77,77,0.2);
  color: var(--red);
}

.action-btn.cancel:hover {
  background: rgba(255,77,77,0.18);
}

/* ローディング */
.loading {
  text-align: center;
  padding: 60px 20px;
  color: var(--text2);
}

.spinner {
  width: 32px;
  height: 32px;
  border: 2px solid var(--border);
  border-top-color: var(--green);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin: 0 auto 12px;
}

/* 空 */
.empty {
  text-align: center;
  padding: 48px 20px;
  color: var(--text2);
}

.empty-icon {
  font-size: 48px;
  margin-bottom: 12px;
  opacity: 0.5;
}

.empty p {
  font-size: 14px;
  line-height: 1.7;
}

/* 新規予約ボタン */
.book-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  padding: 16px;
  background: var(--green);
  color: #fff;
  border: none;
  border-radius: 16px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  margin-top: 20px;
  text-decoration: none;
  box-shadow: 0 8px 24px var(--green-glow);
  transition: all 0.2s;
  opacity: 0;
  animation: fadeUp 0.4s ease 0.3s forwards;
}

.book-btn:hover {
  background: var(--green2);
  transform: translateY(-1px);
}

/* エラー */
.error-box {
  background: var(--red-bg);
  border: 1px solid rgba(255,77,77,0.2);
  border-radius: 14px;
  padding: 16px;
  color: var(--red);
  font-size: 13px;
  line-height: 1.6;
  margin-bottom: 16px;
  display: none;
}

/* アニメーション */
@keyframes fadeUp {
  to { opacity: 1; transform: translateY(0); }
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.processing-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(255,255,255,0.88);
  z-index: 200;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 14px;
}
.processing-overlay.show { display: flex; }
.processing-overlay .proc-spinner {
  width: 40px; height: 40px;
  border: 3px solid #e8e8e8;
  border-top-color: var(--green);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
.processing-overlay .proc-text {
  font-size: 16px; font-weight: 700; color: #333; text-align: center; line-height: 1.6;
}

/* カードのスタガーアニメーション */
.res-card:nth-child(1) { animation-delay: 0.2s; }
.res-card:nth-child(2) { animation-delay: 0.25s; }
.res-card:nth-child(3) { animation-delay: 0.3s; }
.res-card:nth-child(4) { animation-delay: 0.35s; }
.res-card:nth-child(5) { animation-delay: 0.4s; }
.res-card:nth-child(n+6) { animation-delay: 0.45s; }
</style>
</head>

  <!-- リスト -->

    </div>
  </div>

  <!-- 新規予約ボタン -->

    ＋ 新しいレッスンを予約する<span id="bookBtnSub" style="display:block;font-size:12px;opacity:0.85;">Book a New Lesson</span>
  </a>

</div>

    cancelled: "Storniert", soon: "Bald", confirmed: "Bestätigt", done: "Abgeschlossen",
    lesson: "Unterricht", fee: "Gebühr", date: "Datum", time: "Uhrzeit",
    noUpcoming: "Keine bevorstehenden Unterrichtsstunden.\nJetzt buchen!", noPast: "Keine vergangenen Unterrichtsstunden. (Letzte 3 Monate)", noAll: "Keine Unterrichtsstunden gefunden.",
    failedLoad: "Laden fehlgeschlagen. / Erneut versuchen",
    historyNote: "Nur Verlauf der letzten 3 Monate wird angezeigt."
  }
};

function getMyBookingLang() {
  return localStorage.getItem("userLang") || "en";
}

function applyMyBookingLang() {
  const l = getMyBookingLang();
  if (l === "ja") return;
  const T = MYBOOKING_TRANS[l] || MYBOOKING_TRANS["en"];
  window._mybookingT = T;

  // タイトル
  const titleSpan = document.querySelector("h1 span");
  if (titleSpan) titleSpan.textContent = T.title;

  // タブ
  const tabs = document.querySelectorAll(".tab");
  const tabKeys = ["upcoming", "all", "past"];
  tabs.forEach((tab, i) => {
    const span = tab.querySelector("span");
    if (span && tabKeys[i]) span.textContent = T[tabKeys[i]] || "";
  });

  // 今後のレッスン数表示
  const upcomingLabel = document.querySelector(".stat-card .label span");
  if (upcomingLabel) upcomingLabel.textContent = T.upcomingLabel;

  // 累計レッスン
  const totalLabel = document.querySelectorAll(".stat-card .label span");
  if (totalLabel[1]) totalLabel[1].textContent = T.totalLabel || "Total";

  // 予約ボタンのサブテキスト
  const bookBtnSub = document.getElementById("bookBtnSub");
  if (bookBtnSub) bookBtnSub.textContent = T.bookBtn;

  // 回数券タイトル
  const ticketTitle = document.querySelector("#ticketSection > div");
  if (ticketTitle) ticketTitle.textContent = "🎟️ 回数券 / " + T.tickets;

  // 3ヶ月注意書きサブテキスト
  const historyNoteSub = document.getElementById("historyNoteSub");
  if (historyNoteSub) historyNoteSub.textContent = T.historyNote || "Showing history from the last 3 months only.";
}

let allReservations = [];
let currentTab = "upcoming";
let userId = null;

// ===== タイムゾーン =====
let userTimezone = null;
let userTzName = null;

function detectTimezone() {
  try {
    userTimezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
    const now = new Date();
    userTzName = now.toLocaleTimeString('en-US', { timeZoneName: 'short', timeZone: userTimezone }).split(' ').pop();
  } catch (e) {}
}

function getLocalTime(dateStr, timeStr) {
  if (!userTimezone || userTimezone === 'Asia/Tokyo') return '';
  try {
    const jstDate = new Date(`${dateStr}T${timeStr}:00+09:00`);
    const localTime = jstDate.toLocaleTimeString('en-US', {
      hour: '2-digit', minute: '2-digit', hour12: false, timeZone: userTimezone
    });
    const localDate = jstDate.toLocaleDateString('en-CA', { timeZone: userTimezone });
    if (localDate !== dateStr) {
      const parts = localDate.split('-');
      return `${Number(parts[1])}/${Number(parts[2])} ${localTime}`;
    }
    return localTime;
  } catch (e) { return ''; }
}

// ===== 曜日 =====
function getDayLabel(dateStr) {
  const d = new Date(dateStr + "T00:00:00+09:00");
  return ["日", "月", "火", "水", "木", "金", "土"][d.getDay()];
}

function formatDate(dateStr) {
  const parts = dateStr.split("-");
  return `${Number(parts[1])}月${Number(parts[2])}日`;
}

// ===== タブ =====
function setTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll(".tab").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");

  // 過去・すべてタブのときだけ注意書きを表示
  const note = document.getElementById("historyNote");
  if (note) note.style.display = (tab === "past" || tab === "all") ? "block" : "none";

  renderList();
}

// ===== リスト描画 =====
function renderList() {
  const now = new Date();
  const threeMonthsAgo = new Date();
  threeMonthsAgo.setMonth(threeMonthsAgo.getMonth() - 3);
  const list = document.getElementById("listEl");

  let filtered = allReservations.filter(r => {
    const dt = new Date(`${r.date}T${r.time}:00+09:00`);
    const isCancelled = r.status === "キャンセル";
    const isUpcoming = !isCancelled && dt > now;
    const isPast = !isCancelled && dt <= now;

    if (currentTab === "upcoming") return isUpcoming;
    if (currentTab === "past") {
      // 過去タブは3ヶ月以内のみ表示
      return isPast && dt >= threeMonthsAgo;
    }
    // すべてタブも3ヶ月以内のみ表示
    return dt >= threeMonthsAgo || isUpcoming;
  });

  // 今後は昇順、過去・全ては降順
  filtered.sort((a, b) => {
    const da = new Date(`${a.date}T${a.time}:00+09:00`);
    const db = new Date(`${b.date}T${b.time}:00+09:00`);
    return currentTab === "upcoming" ? da - db : db - da;
  });

  if (!filtered.length) {
    const T = window._mybookingT || {};
    const emptyMsg = currentTab === "upcoming"
      ? (T.noUpcoming || "今後の予約はありません。\n新しいレッスンを予約しましょう！")
      : currentTab === "past"
      ? (T.noPast || "該当する予約がありません。\n(直近3ヶ月の履歴のみ表示)")
      : (T.noAll || "該当する予約がありません。");
    list.innerHTML = `
      <div class="empty">
        <div class="empty-icon">${currentTab === "upcoming" ? "📭" : "📋"}</div>
        <p>${emptyMsg}</p>
      </div>`;
    return;
  }

  list.innerHTML = filtered.map((r, i) => renderCard(r, now, i)).join("");
}

// ===== カード描画 =====
function renderCard(r, now, index) {
  const dt = new Date(`${r.date}T${r.time}:00+09:00`);
  const isCancelled = r.status === "キャンセル";
  const isUpcoming = !isCancelled && dt > now;
  const isPast = !isCancelled && dt <= now;

  // 12時間以内かどうか（変更・キャンセル可否）
  const hoursUntil = (dt - now) / (1000 * 60 * 60);
  const canModify = isUpcoming && hoursUntil > 12;

  // ステータスバッジ
  const T = window._mybookingT || {};
  let statusClass, statusText;
  if (isCancelled) {
    statusClass = "cancelled"; statusText = "キャンセル済 / " + (T.cancelled || "Cancelled");
  } else if (isUpcoming && hoursUntil <= 24) {
    statusClass = "upcoming"; statusText = "🔔 まもなく / " + (T.soon || "Soon");
  } else if (isUpcoming) {
    statusClass = "confirmed"; statusText = "予約確定 / " + (T.confirmed || "Confirmed");
  } else {
    statusClass = "past"; statusText = "完了 / " + (T.done || "Done");
  }

  const cardClass = isCancelled ? "cancelled" : isUpcoming ? "upcoming" : "past";

  const userLang = localStorage.getItem("userLang") || "";
  const langParam = userLang && userLang !== "ja" ? `&lang=${encodeURIComponent(userLang)}` : "";
  const changeUrl = `https://ami-app-eta.vercel.app/change.html?id=${encodeURIComponent(r.reservationId)}${langParam}`;
  const cancelUrl = `https://ami-app-eta.vercel.app/cancel.html?id=${encodeURIComponent(r.reservationId)}${langParam}`;

  const meetSection = (isUpcoming && r.meetUrl) ? `
    <a class="meet-btn" href="${escHtml(r.meetUrl)}" target="_blank">
      📹 Google Meet でレッスンに参加 / ${T.meetBtn || "Join via Google Meet"}
    </a>` : "";

  const footerSection = canModify ? `
    <div class="card-footer">
      <a class="action-btn change" href="${changeUrl}">📝 変更 / ${T.changeBtn || "Change"}</a>
      <a class="action-btn cancel" href="${cancelUrl}">🗑 キャンセル / ${T.cancelBtn || "Cancel"}</a>
    </div>` : "";

  const price = String(r.price || "").replace(/\$/g, "");

  return `
    <div class="res-card ${cardClass}">
      <div class="card-top">
        <span class="lesson-badge">⏱ ${escHtml(r.lesson)}</span>
        <span class="status-badge ${statusClass}">${statusText}</span>
      </div>
      <div class="card-body">
        <div class="datetime-row">
          <span class="datetime-date">${formatDate(r.date)}</span>
          <span class="datetime-time">${escHtml(r.time)} <span style="font-size:11px;color:#aaa;">JST</span></span>
          <span class="datetime-day">${getDayLabel(r.date)}</span>
        </div>
        ${getLocalTime(r.date, r.time) ? `<div style="font-size:12px;color:#aaa;margin-top:2px;padding-left:2px;">🌍 ${getLocalTime(r.date, r.time)} (${userTzName || ''})</div>` : ''}
        <div class="detail-row">
          <span>レッスン料金 / ${T.fee || "Fee"}</span>
          <span class="price-text">$${escHtml(price)}</span>
        </div>
        ${meetSection}
      </div>
      ${footerSection}
    </div>`;
}

function escHtml(str) {
  return String(str || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

// ===== 回数券描画 =====
function renderTickets(tickets) {
  const section = document.getElementById("ticketSection");
  const list = document.getElementById("ticketList");
  const now = new Date();

  // 有効な回数券のみ表示（残り0・期限切れは非表示）
  const validTickets = tickets.filter(t => {
    const expiry = new Date(t.expiry + "T23:59:59+09:00");
    return t.remaining > 0 && expiry >= now;
  });

  if (!validTickets.length) {
    section.style.display = "none";
    return;
  }

  const html = validTickets.map(t => {
    const T = window._mybookingT || {};
    const isLow = t.remaining <= 2;
    const expiryParts = t.expiry.split("-");
    const expiryStr = `${Number(expiryParts[1])}/${Number(expiryParts[2])}まで / ${T.ticketExpiry || "Until"} ${Number(expiryParts[1])}/${Number(expiryParts[2])}`;

    return `
      <div style="
        background:var(--card);
        border:1px solid rgba(6,199,85,0.25);
        border-radius:16px;
        padding:14px 16px;
        display:flex;
        align-items:center;
        justify-content:space-between;
        margin-bottom:8px;
      ">
        <div>
          <div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:3px;">${escHtml(t.lesson)}</div>
          <div style="font-size:11px;color:var(--text2);">有効期限 ${expiryStr}</div>
        </div>
        <div style="text-align:right;">
          <div style="font-size:28px;font-weight:700;font-family:'DM Sans',sans-serif;color:${isLow ? 'var(--yellow)' : 'var(--green)'};line-height:1;">
            ${t.remaining}
          </div>
          <div style="font-size:11px;color:var(--text2);margin-top:2px;">回残り / ${T.ticketsLeft || "left"}</div>
        </div>
      </div>`;
  }).join("");

  list.innerHTML = html;
  section.style.display = "block";
}

// ===== サマリー更新 =====
function updateSummary(reservations) {
  const now = new Date();
  const upcoming = reservations.filter(r => {
    if (r.status === "キャンセル") return false;
    return new Date(`${r.date}T${r.time}:00+09:00`) > now;
  });
  const completed = reservations.filter(r => {
    if (r.status === "キャンセル") return false;
    return new Date(`${r.date}T${r.time}:00+09:00`) <= now;
  });

  document.getElementById("statUpcoming").textContent = upcoming.length;
  document.getElementById("statTotal").textContent = completed.length;
}

// ===== メイン =====
let retryCount = 0;
const MAX_RETRY = 3;

async function init() {
  try {
    await liff.init({ liffId: LIFF_ID });

    if (!liff.isLoggedIn()) {
      liff.login({ redirectUri: window.location.href });
      return;
    }

    const profile = await liff.getProfile();
    userId = profile.userId;

    // 言語適用
    applyMyBookingLang();

    // プロフィール表示
    const profileBar = document.getElementById("profileBar");
    profileBar.style.display = "flex";
    document.getElementById("profileName").textContent = profile.displayName || "ユーザー";

    if (profile.pictureUrl) {
      const avatarEl = document.getElementById("avatarEl");
      avatarEl.innerHTML = `<img src="${profile.pictureUrl}" alt="avatar">`;
    }

    // 予約データと回数券を並行取得
    const [res, ticketRes] = await Promise.all([
      fetch(`${GAS_URL}?action=getMyReservations&userId=${encodeURIComponent(userId)}&t=${Date.now()}`),
      fetch(`${GAS_URL}?action=getMyTickets&userId=${encodeURIComponent(userId)}&t=${Date.now()}`)
    ]);

    const data = await res.json();
    const ticketData = await ticketRes.json();

    if (!data.ok) throw new Error(data.message || "取得失敗");

    allReservations = data.reservations || [];

    // GASからタイムゾーンを取得して設定
    if (data.timezone && data.timezone !== '' && data.timezone !== 'Asia/Tokyo') {
      userTimezone = data.timezone;
      try {
        const now2 = new Date();
        userTzName = now2.toLocaleTimeString('en-US', { timeZoneName: 'short', timeZone: userTimezone }).split(' ').pop();
      } catch(e) {}
    }

    // GASから言語を取得して設定
    if (data.lang && data.lang !== 'ja') {
      localStorage.setItem("userLang", data.lang);
      applyMyBookingLang();
    }

    updateSummary(allReservations);

    // 回数券表示
    if (ticketData.ok && ticketData.tickets && ticketData.tickets.length > 0) {
      renderTickets(ticketData.tickets);
    }

    document.getElementById("summaryRow").style.display = "grid";
    document.getElementById("tabsEl").style.display = "flex";
    document.getElementById("bookBtn").style.display = "flex";

    renderList();

  } catch (e) {
    console.error(e);
    // 自動リトライ
    if (retryCount < MAX_RETRY) {
      retryCount++;
      console.log(`リトライ ${retryCount}/${MAX_RETRY}`);
      setTimeout(init, 2000);
      return;
    }
    const box = document.getElementById("errorBox");
    box.style.display = "block";
    box.innerHTML = `
      ⚠️ 読み込みに失敗しました。<br>
      <span style="font-size:12px;color:#ff8a8a;">Failed to load.</span><br><br>
      <button onclick="location.reload()" style="
        padding:10px 20px;
        background:#ff4d4d;
        color:#fff;
        border:none;
        border-radius:10px;
        font-size:14px;
        font-weight:700;
        cursor:pointer;
        font-family:inherit;
      ">🔄 再読み込み / Retry</button>
    `;
    document.getElementById("listEl").innerHTML = "";
  }
}

detectTimezone();
init();
</script>
