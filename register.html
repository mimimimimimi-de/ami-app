<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>レッスン登録</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --green: #06C755;
  --green2: #04a344;
  --green-pale: #e8faf0;
  --text: #1a1a1a;
  --text2: #666;
  --bg: #f0f7f2;
}

html, body {
  min-height: 100vh;
  font-family: 'Zen Kaku Gothic New', sans-serif;
}

body {
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px 16px;
  position: relative;
  overflow: hidden;
}

/* 背景の丸 */
.bg-circle {
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
}

.bg-circle-1 {
  width: 300px;
  height: 300px;
  background: radial-gradient(circle, rgba(6,199,85,0.12) 0%, transparent 70%);
  top: -80px;
  right: -80px;
}

.bg-circle-2 {
  width: 250px;
  height: 250px;
  background: radial-gradient(circle, rgba(6,199,85,0.08) 0%, transparent 70%);
  bottom: -60px;
  left: -60px;
}

.wrap {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 400px;
}

/* ロゴエリア */
.logo-area {
  text-align: center;
  margin-bottom: 28px;
  opacity: 0;
  animation: fadeDown 0.5s ease 0.1s forwards;
}

.logo-icon {
  width: 72px;
  height: 72px;
  background: linear-gradient(135deg, var(--green), var(--green2));
  border-radius: 22px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  margin-bottom: 14px;
  box-shadow: 0 12px 32px rgba(6,199,85,0.3);
}

.logo-area h1 {
  font-size: 26px;
  font-weight: 900;
  color: var(--text);
  letter-spacing: -0.01em;
  line-height: 1.2;
}

.logo-area h1 span {
  color: var(--green);
}

.logo-area p {
  font-size: 14px;
  color: var(--text2);
  margin-top: 6px;
}

/* メインカード */
.card {
  background: #fff;
  border-radius: 28px;
  padding: 32px 24px;
  box-shadow: 0 16px 48px rgba(0,0,0,0.08);
  opacity: 0;
  animation: fadeUp 0.5s ease 0.2s forwards;
}

/* ステップ表示（登録前） */
.steps {
  margin-bottom: 28px;
}

.step {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 12px 0;
  border-bottom: 1px solid #f0f0f0;
}

.step:last-child { border-bottom: none; }

.step-num {
  width: 28px;
  height: 28px;
  background: var(--green-pale);
  color: var(--green2);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 700;
  flex-shrink: 0;
  margin-top: 1px;
}

.step-text .title {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
}

.step-text .desc {
  font-size: 12px;
  color: var(--text2);
  margin-top: 2px;
  line-height: 1.6;
}

/* 登録ボタン */
.register-btn {
  width: 100%;
  padding: 18px;
  background: linear-gradient(135deg, var(--green), var(--green2));
  color: #fff;
  border: none;
  border-radius: 18px;
  font-size: 17px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  box-shadow: 0 8px 24px rgba(6,199,85,0.35);
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  letter-spacing: 0.02em;
}

.register-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 32px rgba(6,199,85,0.4);
}

.register-btn:active {
  transform: translateY(0);
}

.register-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none;
}

.note {
  margin-top: 14px;
  font-size: 12px;
  color: var(--text2);
  text-align: center;
  line-height: 1.7;
}

/* ステータスメッセージ */
.status {
  margin-top: 16px;
  font-size: 14px;
  font-weight: 700;
  text-align: center;
  color: var(--green);
  min-height: 20px;
}

.status.error { color: #d93025; }

/* 完了画面 */
.done-card {
  display: none;
  text-align: center;
}

.done-icon {
  font-size: 64px;
  margin-bottom: 16px;
  animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards;
}

.done-card h2 {
  font-size: 22px;
  font-weight: 900;
  color: var(--text);
  margin-bottom: 10px;
}

.done-card .done-name {
  display: inline-block;
  background: var(--green-pale);
  color: var(--green2);
  font-weight: 700;
  padding: 6px 16px;
  border-radius: 20px;
  font-size: 15px;
  margin-bottom: 16px;
}

.done-card p {
  font-size: 14px;
  color: var(--text2);
  line-height: 1.8;
}

.done-card .highlight {
  color: var(--green);
  font-weight: 700;
}

/* すでに登録済み */
.already-card {
  display: none;
  text-align: center;
}

.already-icon {
  font-size: 48px;
  margin-bottom: 12px;
}

.already-card h2 {
  font-size: 20px;
  font-weight: 900;
  color: var(--text);
  margin-bottom: 10px;
}

.already-card p {
  font-size: 14px;
  color: var(--text2);
  line-height: 1.8;
}

.book-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 18px;
  padding: 13px 24px;
  background: var(--green);
  color: #fff;
  border-radius: 14px;
  font-size: 14px;
  font-weight: 700;
  text-decoration: none;
  box-shadow: 0 6px 18px rgba(6,199,85,0.3);
  transition: all 0.2s;
}

.book-link:hover {
  background: var(--green2);
  transform: translateY(-1px);
}

/* アニメーション */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeDown {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes popIn {
  from { transform: scale(0.5); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
</style>
</head>

<body>

<div class="bg-circle bg-circle-1"></div>
<div class="bg-circle bg-circle-2"></div>

<div class="wrap">

  <div class="logo-area">
    <div class="logo-icon">🇯🇵</div>
    <h1>Ami's<br><span>Japanese Lesson</span></h1>
    <p>日本語レッスン予約システム</p>
  </div>

  <div class="card">

    <!-- 登録前 -->
    <div id="registerView">
      <div class="steps">
        <div class="step">
          <div class="step-num">1</div>
          <div class="step-text">
            <div class="title">まず登録する</div>
            <div class="desc">下のボタンを押すだけ！<br>LINEアカウントで自動登録されます。</div>
          </div>
        </div>
        <div class="step">
          <div class="step-num">2</div>
          <div class="step-text">
            <div class="title">先生が料金を設定</div>
            <div class="desc">登録後、先生があなたの料金を設定します。</div>
          </div>
        </div>
        <div class="step">
          <div class="step-num">3</div>
          <div class="step-text">
            <div class="title">予約スタート！</div>
            <div class="desc">先生からLINEが届いたら予約できるようになります。</div>
          </div>
        </div>
      </div>

      <button class="register-btn" id="registerBtn" onclick="register()">
        📝 登録する
      </button>

      <p class="note">
        LINEのお名前が自動で登録されます。<br>
        個人情報は予約管理のみに使用します。
      </p>

      <div class="status" id="status"></div>
    </div>

    <!-- 登録完了 -->
    <div class="done-card" id="doneView">
      <div class="done-icon">🎉</div>
      <h2>登録完了！</h2>
      <div class="done-name" id="doneName"></div>
      <p>
        登録が完了しました。<br>
        先生が料金を設定したら<br>
        <span class="highlight">LINEでお知らせします</span>ので<br>
        しばらくお待ちください。
      </p>
    </div>

    <!-- 登録済み -->
    <div class="already-card" id="alreadyView">
      <div class="already-icon">✅</div>
      <h2>すでに登録済みです</h2>
      <p id="alreadyText">
        登録が確認できました。
      </p>
      <a class="book-link" href="https://ami-app-eta.vercel.app/">
        📅 レッスンを予約する
      </a>
    </div>

  </div>
</div>

<script>
const LIFF_ID = "2009890655-O8QZVlRf"; // ← register用の新しいLIFF IDに変更してください
const GAS_URL = "https://script.google.com/macros/s/AKfycbzRX0UZSwDW3h9V7tUGA1grjhNlfU9e60H4hGzABbAJl0cWn40VFwy4D2mY-vgEvSY/exec";

let userId = null;
let displayName = null;

function setStatus(msg, isError = false) {
  const el = document.getElementById("status");
  el.textContent = msg;
  el.className = "status" + (isError ? " error" : "");
}

function showView(id) {
  ["registerView", "doneView", "alreadyView"].forEach(v => {
    document.getElementById(v).style.display = v === id ? "block" : "none";
  });
}

async function register() {
  const btn = document.getElementById("registerBtn");
  btn.disabled = true;
  setStatus("登録処理中...");

  try {
    const res = await fetch(
      GAS_URL +
      "?action=registerUser" +
      "&userId=" + encodeURIComponent(userId) +
      "&name=" + encodeURIComponent(displayName) +
      "&t=" + Date.now()
    );

    const data = await res.json();

    if (data.already) {
      // 登録済み → 料金があれば予約へ誘導
      document.getElementById("alreadyText").textContent =
        data.hasPrice
          ? "すでに登録済みで、料金も設定されています。予約ページへどうぞ！"
          : "登録済みです。先生が料金を設定したらLINEでお知らせします。";

      if (!data.hasPrice) {
        document.querySelector(".book-link").style.display = "none";
      }

      showView("alreadyView");
      return;
    }

    if (data.ok) {
      document.getElementById("doneName").textContent = displayName + " さん";
      showView("doneView");
      return;
    }

    throw new Error(data.message || "登録に失敗しました");

  } catch (e) {
    console.error(e);
    btn.disabled = false;
    setStatus("登録に失敗しました。もう一度お試しください。", true);
  }
}

async function init() {
  setStatus("LINE情報を確認しています...");

  try {
    await liff.init({ liffId: LIFF_ID });

    if (!liff.isLoggedIn()) {
      liff.login({ redirectUri: window.location.href });
      return;
    }

    const profile = await liff.getProfile();
    userId = profile.userId;
    displayName = profile.displayName || "ユーザー";

    setStatus("");

  } catch (e) {
    console.error(e);
    setStatus("LINEアプリ内で開き直してください。", true);
    document.getElementById("registerBtn").disabled = true;
  }
}

init();
</script>
</body>
</html>
