<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>購入完了</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans JP', 'DM Sans', sans-serif;
  background: #f5f6f7;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px 16px;
}

.card {
  background: #fff;
  border-radius: 24px;
  padding: 36px 24px;
  max-width: 400px;
  width: 100%;
  text-align: center;
  box-shadow: 0 8px 32px rgba(0,0,0,0.08);
}

.icon {
  font-size: 60px;
  margin-bottom: 16px;
  animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards;
}

h1 {
  font-size: 22px;
  font-weight: 700;
  color: #06C755;
  margin-bottom: 10px;
}

.ticket-info {
  background: #e8faf0;
  border: 1px solid rgba(6,199,85,0.3);
  border-radius: 16px;
  padding: 18px;
  margin: 18px 0;
  text-align: left;
  font-size: 14px;
  line-height: 2;
}

.ticket-info .row {
  display: flex;
  justify-content: space-between;
}

.ticket-info .key { color: #666; }
.ticket-info .val { font-weight: 700; color: #1a1a1a; }

p {
  font-size: 14px;
  color: #666;
  line-height: 1.8;
  margin-bottom: 20px;
}

.btn {
  display: block;
  width: 100%;
  padding: 15px;
  border-radius: 14px;
  border: none;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  text-decoration: none;
  margin-top: 10px;
  transition: all 0.15s;
}

.btn-green {
  background: #06C755;
  color: #fff;
  box-shadow: 0 6px 18px rgba(6,199,85,0.3);
}

.btn-green:hover { background: #04a344; }

.btn-gray {
  background: #e5e5e5;
  color: #333;
}

.status {
  margin-top: 12px;
  font-size: 14px;
  font-weight: 700;
  color: #06C755;
  min-height: 20px;
}

.status.error { color: #d93025; }

.processing-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(255,255,255,0.85);
  z-index: 999;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
}
.processing-overlay.show { display: flex; }
.spinner {
  width: 44px; height: 44px;
  border: 4px solid #e0e0e0;
  border-top-color: #06C755;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
.processing-text {
  font-size: 15px;
  font-weight: 700;
  color: #333;
  text-align: center;
  line-height: 1.8;
}
@keyframes spin { to { transform: rotate(360deg); } }

@keyframes popIn {
  from { transform: scale(0.5); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
</style>
</head>

<body>
<div class="processing-overlay" id="processingOverlay">
  <div class="spinner"></div>
  <div class="processing-text" id="overlayText">
    保存中...<br><span id="overlaySubText" style="font-size:13px;color:#888;"></span>
  </div>
</div>

<div class="card">
  <div class="icon">🎉</div>
  <h1>購入完了！<span id="subTitle" style="display:block;font-size:0.55em;font-weight:400;color:#06C755;margin-top:4px;"></span></h1>

  <div class="ticket-info" id="ticketInfo">
    <div class="row"><span class="key">レッスン<span id="subLesson" style="display:block;font-size:10px;font-weight:400;color:#aaa;"></span></span><span class="val" id="infoLesson">--</span></div>
    <div class="row"><span class="key">回数<span id="subCount" style="display:block;font-size:10px;font-weight:400;color:#aaa;"></span></span><span class="val" id="infoCount">--</span></div>
    <div class="row"><span class="key">有効期限<span id="subExpiry" style="display:block;font-size:10px;font-weight:400;color:#aaa;"></span></span><span class="val" id="infoExpiry">2ヶ月</span></div>
  </div>

  <p>回数券の購入ありがとうございます！<br>予約時に「回数券を使う」を選んでご利用ください。<br><span id="subThanks" style="font-size:12px;color:#aaa;"></span></p>

  <div class="status" id="status">予約情報を保存しています...</div>

  <a class="btn btn-green" href="https://ami-app-eta.vercel.app/" id="bookBtn" style="display:none">
    📅 さっそく予約する<span id="subBookBtn" style="display:block;font-size:11px;opacity:0.85;"></span>
  </a>
  <a class="btn btn-gray" href="https://liff.line.me/2009890655-O8QZVlRf" id="myBookingBtn" style="display:none">
    マイ予約を確認する<span id="subMyBooking" style="display:block;font-size:11px;opacity:0.85;"></span>
  </a>
</div>

<script>
const LIFF_ID = "2009890655-LQDDtX3w";
const GAS_URL = "https://script.google.com/macros/s/AKfycbzRX0UZSwDW3h9V7tUGA1grjhNlfU9e60H4hGzABbAJl0cWn40VFwy4D2mY-vgEvSY/exec";

const SUCCESS_TICKET_TRANS = {
  en: { title: "Purchase Complete!", lesson: "Lesson", count: "Lessons", expiry: "Validity", months: "2 months", thanks: "Thank you for purchasing lesson tickets!\nSelect 'Use Ticket' when booking to use them.", saving: "Saving ticket info...", saved: "✅ Purchase saved!", bookBtn: "📅 Book a Lesson Now", myBookingBtn: "View My Bookings" },
  zh: { title: "购买完成！", lesson: "课程", count: "次数", expiry: "有效期", months: "3个月", thanks: "感谢您购买课程次券！\n预约时选择「使用次券」即可使用.", saving: "正在保存次券信息...", saved: "✅ 购买已保存！", bookBtn: "📅 立即预约", myBookingBtn: "查看我的预约" },
  ko: { title: "구매 완료！", lesson: "레슨", count: "횟수", expiry: "유효기간", months: "3개월", thanks: "레슨 횟수권을 구매해 주셔서 감사합니다！\n예약 시 「횟수권 사용」을 선택하여 이용해 주세요.", saving: "횟수권 정보를 저장하고 있습니다...", saved: "✅ 구매가 저장되었습니다！", bookBtn: "📅 바로 예약하기", myBookingBtn: "내 예약 확인" },
  th: { title: "ซื้อสำเร็จ！", lesson: "บทเรียน", count: "ครั้ง", expiry: "อายุการใช้งาน", months: "3 เดือน", thanks: "ขอบคุณที่ซื้อคูปองบทเรียน！\nเลือก「ใช้คูปอง」เมื่อจองเพื่อใช้งาน.", saving: "กำลังบันทึกข้อมูลคูปอง...", saved: "✅ บันทึกการซื้อแล้ว！", bookBtn: "📅 จองทันที", myBookingBtn: "ดูการจองของฉัน" },
  fr: { title: "Achat termine !", lesson: "Lecon", count: "Lecons", expiry: "Validite", months: "3 mois", thanks: "Merci d'avoir achete des tickets de lecon !\nSelectionnez 'Utiliser un ticket' lors de la reservation.", saving: "Sauvegarde des informations...", saved: "✅ Achat sauvegarde !", bookBtn: "📅 Reserver maintenant", myBookingBtn: "Voir mes reservations" },
  de: { title: "Kauf abgeschlossen!", lesson: "Unterricht", count: "Stunden", expiry: "Gueltigkeit", months: "3 Monate", thanks: "Danke fuer den Kauf der Unterrichts-Tickets!\nWaehlen Sie beim Buchen 'Ticket verwenden'.", saving: "Ticket-Informationen werden gespeichert...", saved: "✅ Kauf gespeichert!", bookBtn: "📅 Jetzt buchen", myBookingBtn: "Meine Buchungen ansehen" }
};

function applySuccessTicketLang(lang) {
  const l = lang || localStorage.getItem("userLang") || "en";
  // 日本語の場合は英語サブテキストを表示
  const T = l === "ja" ? SUCCESS_TICKET_TRANS["en"] : (SUCCESS_TICKET_TRANS[l] || SUCCESS_TICKET_TRANS["en"]);
  window._stT = T;

  const set = (id, text) => { const el = document.getElementById(id); if (el) el.textContent = text; };

  set("subTitle", T.title);
  set("subLesson", T.lesson);
  set("subCount", T.count);
  set("subExpiry", T.expiry);
  set("subThanks", T.thanks.replace("\n", " "));
  set("subBookBtn", T.bookBtn);
  set("subMyBooking", T.myBookingBtn);
  set("overlaySubText", T.saving || "Saving...");
}

function setStatus(msg, isError = false) {
  const el = document.getElementById("status");
  el.innerHTML = msg.replace("\n", "<br><span style='font-size:12px;color:#aaa;'>");
  if (msg.includes("\n")) el.innerHTML += "</span>";
  el.className = "status" + (isError ? " error" : "");
}

async function saveTicket() {
  const params = new URLSearchParams(window.location.search);

  // 言語適用（URLパラメータ優先）
  const urlLang = params.get("lang");
  if (urlLang) localStorage.setItem("userLang", urlLang);
  applySuccessTicketLang(urlLang || localStorage.getItem("userLang") || "en");
  const T = window._stT || {};

  // URLパラメータから取得（localStorage優先）
  const lesson = localStorage.getItem("ticketLesson") || params.get("lesson");
  const count = localStorage.getItem("ticketCount") || params.get("count");
  const userId = localStorage.getItem("ticketUserId") || params.get("uid");
  const name = localStorage.getItem("ticketName") || "";
  const sessionId = params.get("session_id");

  // オーバーレイ表示
  const overlay = document.getElementById("processingOverlay");
  const overlayText = document.getElementById("overlayText");
  if (overlayText) overlayText.innerHTML = `保存中...<br><span style="font-size:13px;color:#888;">${T.saving || "Saving..."}</span>`;
  if (overlay) overlay.classList.add("show");

  // 表示更新
  const lessonLabel = String(lesson) === "50" ? "50分レッスン" : "25分レッスン";
  document.getElementById("infoLesson").textContent = lessonLabel;
  document.getElementById("infoCount").textContent = (count || "--") + "回";

  // 有効期限計算（2ヶ月後）
  const expiry = new Date();
  expiry.setMonth(expiry.getMonth() + 2);
  document.getElementById("infoExpiry").textContent =
    `${expiry.getFullYear()}/${expiry.getMonth()+1}/${expiry.getDate()}まで`;

  if (!userId || !lesson || !count) {
    if (overlay) overlay.classList.remove("show");
    setStatus("購入情報が見つかりませんでした。先生にご連絡ください。", true);
    return;
  }

  try {
    // StripeセッションからpaymentIntentId取得
    let paymentIntentId = "";
    if (sessionId) {
      try {
        const res = await fetch(`/api/get-checkout-session?session_id=${sessionId}`);
        const data = await res.json();
        paymentIntentId = data.payment_intent || "";
      } catch(e) { console.error(e); }
    }

    // Vercel経由でGASに保存
    const gasRes = await fetch("/api/save-ticket", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        userId,
        name,
        lesson: lessonLabel,
        count: Number(count),
        paymentIntentId
      })
    });

    const gasData = await gasRes.json();

    if (!gasData.ok) {
      if (overlay) overlay.classList.remove("show");
      setStatus("保存に失敗しました：" + (gasData.message || "不明なエラー"), true);
      return;
    }

    // localStorage削除
    localStorage.removeItem("ticketLesson");
    localStorage.removeItem("ticketCount");
    localStorage.removeItem("ticketUserId");
    localStorage.removeItem("ticketName");

    if (overlay) overlay.classList.remove("show");
    setStatus("✅ 回数券を保存しました！" + (T.saved ? "\n" + T.saved : ""));
    document.getElementById("bookBtn").style.display = "block";
    document.getElementById("myBookingBtn").style.display = "block";

  } catch (e) {
    console.error(e);
    if (overlay) overlay.classList.remove("show");
    setStatus("保存に失敗しました。先生にご連絡ください。", true);
  }
}

window.addEventListener("DOMContentLoaded", () => {
  saveTicket();
});
</script>
</body>
</html>
