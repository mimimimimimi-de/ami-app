<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>決済完了</title>

  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      margin: 0;
      padding: 16px;
      background: #f5f6f7;
      color: #222;
    }

    .container { max-width: 460px; margin: 0 auto; }

    .card {
      background: #fff;
      padding: 28px 20px;
      border-radius: 20px;
      margin-top: 18px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    .status {
      margin-top: 12px;
      color: #06C755;
      font-weight: 600;
      white-space: pre-line;
      font-size: 14px;
      text-align: center;
    }
    .error { color: #d93025 !important; }

    .processing-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.92);
      z-index: 200;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 14px;
    }
    .processing-overlay.show { display: flex; }
    .processing-overlay .spinner {
      width: 40px; height: 40px;
      border: 3px solid #e8e8e8;
      border-top-color: #06C755;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    .processing-overlay .processing-text {
      font-size: 16px; font-weight: 600; color: #333; text-align: center; line-height: 1.6;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>

<body>

<div class="processing-overlay show" id="processingOverlay">
  <div class="spinner"></div>
  <div class="processing-text">処理中...<br><span id="overlaySubText" style="font-size:13px;color:#888;"></span></div>
</div>

<div class="container">
  <div class="card">
    <div style="text-align:center;margin-bottom:16px;">
      <div style="width:60px;height:60px;background:#e8faf0;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;margin-bottom:12px;">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#06C755" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <h2 style="margin:0;font-size:22px;color:#06C755;font-weight:600;">決済が完了しました</h2>
      <p style="font-size:11px;color:#aaa;letter-spacing:0.08em;text-transform:uppercase;margin:6px 0 0;" id="subPaymentComplete">Payment Complete</p>
      <p style="font-size:13px;color:#aaa;margin:6px 0 0;" id="subThankYou">Thank you for your booking.</p>
    </div>

    <div class="status" id="status">保存中...</div>

    <div id="bookingInfoArea" style="display:none;background:#f8fdf9;border:0.5px solid #d0ead8;border-radius:14px;padding:18px;margin-top:16px;"></div>

    <div id="calendarBtnArea" style="display:none;margin-top:16px;">
      <a id="calendarLink" href="#" target="_blank" style="all:unset;display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;background:#fff;color:#4285f4;border:0.5px solid #c5d8f8;border-radius:12px;font-size:14px;font-weight:600;text-align:center;cursor:pointer;box-sizing:border-box;">
        📅 Googleカレンダーに追加
        <span id="subCalendar" style="font-size:11px;font-weight:400;color:#aaa;"></span>
      </a>
    </div>

    <button id="closeBtn" onclick="closePage()" style="display:none;all:unset;width:100%;box-sizing:border-box;background:#06C755;border-radius:12px;padding:16px;text-align:center;font-size:15px;font-weight:600;color:#fff;cursor:pointer;margin-top:10px;">
      閉じる <span id="subClose" style="font-size:11px;font-weight:400;opacity:0.8;">Close</span>
    </button>
  </div>
</div>

  <script>
    const LIFF_ID = "2009890655-jIJpN1Ya";
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzRX0UZSwDW3h9V7tUGA1grjhNlfU9e60H4hGzABbAJl0cWn40VFwy4D2mY-vgEvSY/exec";

    const SUCCESS_TRANS = {
      en: { paymentComplete: "Payment Complete", thankYou: "Thank you for your booking.", saving: "Saving your reservation...", saved: "✅ Booking saved. Notification sent via LINE.", calendar: "Add to Google Calendar", close: "Close" },
      zh: { paymentComplete: "付款完成", thankYou: "感谢您的预约。", saving: "正在保存预约内容...", saved: "✅ 预约已保存。已通过LINE发送通知。", calendar: "添加到Google日历", close: "关闭" },
      ko: { paymentComplete: "결제 완료", thankYou: "예약해 주셔서 감사합니다.", saving: "예약 내용을 저장하고 있습니다...", saved: "✅ 예약이 저장되었습니다. LINE으로 알림을 보냈습니다.", calendar: "Google 캘린더에 추가", close: "닫기" },
      th: { paymentComplete: "ชำระเงินเสร็จสมบูรณ์", thankYou: "ขอบคุณสำหรับการจอง", saving: "กำลังบันทึกการจอง...", saved: "✅ บันทึกการจองแล้ว แจ้งเตือนทาง LINE แล้ว", calendar: "เพิ่มใน Google Calendar", close: "ปิด" },
      fr: { paymentComplete: "Paiement effectué", thankYou: "Merci pour votre réservation.", saving: "Enregistrement de votre réservation...", saved: "✅ Réservation enregistrée. Notification envoyée via LINE.", calendar: "Ajouter à Google Agenda", close: "Fermer" },
      de: { paymentComplete: "Zahlung abgeschlossen", thankYou: "Danke für Ihre Buchung.", saving: "Buchung wird gespeichert...", saved: "✅ Buchung gespeichert. Benachrichtigung via LINE gesendet.", calendar: "Zu Google Kalender hinzufügen", close: "Schließen" }
    };

    function applySuccessLang() {
      const urlLang = new URLSearchParams(window.location.search).get("lang");
      const lang = urlLang || localStorage.getItem("userLang") || "en";
      // 日本語の場合は英語サブテキストを表示
      const T = SUCCESS_TRANS[lang] || SUCCESS_TRANS["en"];
      const set = (id, text) => { const el = document.getElementById(id); if (el) el.textContent = text; };
      set("subPaymentComplete", T.paymentComplete);
      set("subThankYou", T.thankYou);
      set("subSaving", T.saving);
      set("subCalendar", T.calendar);
      set("subClose", T.close);
      // オーバーレイのサブテキストも更新
      set("overlaySubText", T.processing || T.saving || "Processing...");
      window._successT = T;
    }

    applySuccessLang();

    const statusEl = document.getElementById("status");

    const localDate = localStorage.getItem("selectedDate");
    const localTime = localStorage.getItem("selectedTime");
    const localLessonType = localStorage.getItem("lessonType");
    const localPrice = localStorage.getItem("price");

    async function getCheckoutData() {
      const params = new URLSearchParams(window.location.search);
      const sessionId = params.get("session_id");

      if (!sessionId) return {};

      try {
        const response = await fetch(`/api/get-checkout-session?session_id=${sessionId}`);
        const data = await response.json();
        if (!response.ok) return {};
        return data;
      } catch (error) {
        console.error("Checkout情報取得エラー:", error);
        return {};
      }
    }

    function toCalDate(d) {
      return d.toISOString().replace(/[-:]/g, "").split(".")[0] + "Z";
    }

    function showCalendarBtn(date, time, lessonType) {
      try {
        const calStart = new Date(`${date}T${time}:00+09:00`);
        const durationMin = Number(lessonType) === 50 ? 50 : 25;
        const calEnd = new Date(calStart.getTime() + durationMin * 60000);

        const calUrl = "https://calendar.google.com/calendar/render?action=TEMPLATE" +
          "&text=" + encodeURIComponent("日本語レッスン（Ami先生）") +
          "&dates=" + toCalDate(calStart) + "/" + toCalDate(calEnd) +
          "&details=" + encodeURIComponent("Ami先生との日本語レッスン");

        document.getElementById("calendarLink").href = calUrl;
        document.getElementById("calendarBtnArea").style.display = "block";
      } catch (e) {
        console.error("カレンダーリンク生成失敗:", e);
      }
    }

    async function saveReservation() {
      let profile;
      let checkoutData = {};
      let paymentIntentId = "";
      let date = localDate;
      let time = localTime;
      let lessonType = localLessonType;
      let priceLabel = "";

      // 言語取得
      const lang = new URLSearchParams(window.location.search).get("lang") || localStorage.getItem("userLang") || "ja";
      const STATUS_TRANS = {
        en: { checkingInfo: "Checking payment & LINE info...", checkingLine: "Verifying LINE info...", checkingSlot: "Checking availability...", saving: "Saving reservation...", saved: "Booking saved. Notification sent via LINE.", notFound: "Reservation info not found.\nPlease contact the teacher.", liffError: "Failed to get LINE info.\nPlease reopen in the LINE app.", slotTaken: "Sorry, this time slot was just booked.\nYou will be refunded.", saveFailed: "Save failed. Please contact the teacher." },
        zh: { checkingInfo: "正在确认付款和LINE信息...", checkingLine: "正在确认LINE信息...", checkingSlot: "正在确认空闲时间...", saving: "正在保存预约...", saved: "预约已保存。已通过LINE发送通知。", notFound: "未找到预约信息。\n请联系老师。", liffError: "无法获取LINE信息。\n请在LINE应用内重新打开。", slotTaken: "抱歉，该时间段已被预约。\n将为您退款。", saveFailed: "保存失败。请联系老师。" },
        ko: { checkingInfo: "결제 및 LINE 정보 확인 중...", checkingLine: "LINE 정보 확인 중...", checkingSlot: "가능 여부 확인 중...", saving: "예약 저장 중...", saved: "예약이 저장되었습니다. LINE으로 알림을 보냈습니다.", notFound: "예약 정보를 찾을 수 없습니다.\n선생님께 연락해 주세요.", liffError: "LINE 정보를 가져오지 못했습니다.\nLINE 앱에서 다시 열어주세요.", slotTaken: "죄송합니다. 이 시간은 이미 예약되었습니다.\n환불 처리됩니다.", saveFailed: "저장 실패. 선생님께 연락해 주세요." },
        th: { checkingInfo: "กำลังตรวจสอบข้อมูลการชำระและ LINE...", checkingLine: "กำลังยืนยันข้อมูล LINE...", checkingSlot: "กำลังตรวจสอบช่องว่าง...", saving: "กำลังบันทึกการจอง...", saved: "บันทึกการจองแล้ว ส่งแจ้งเตือนทาง LINE แล้ว", notFound: "ไม่พบข้อมูลการจอง\nกรุณาติดต่อครู", liffError: "ไม่สามารถรับข้อมูล LINE ได้\nกรุณาเปิดใหม่ใน LINE", slotTaken: "ขออภัย ช่วงเวลานี้ถูกจองแล้ว\nจะดำเนินการคืนเงินให้", saveFailed: "บันทึกล้มเหลว กรุณาติดต่อครู" },
        fr: { checkingInfo: "Vérification du paiement et LINE...", checkingLine: "Vérification des infos LINE...", checkingSlot: "Vérification des disponibilités...", saving: "Enregistrement de la réservation...", saved: "Réservation enregistrée. Notification envoyée via LINE.", notFound: "Informations de réservation introuvables.\nContactez le professeur.", liffError: "Impossible d'obtenir les infos LINE.\nReouvrez dans l'app LINE.", slotTaken: "Désolé, ce créneau est déjà pris.\nVous serez remboursé.", saveFailed: "Échec de l'enregistrement. Contactez le professeur." },
        de: { checkingInfo: "Zahlung und LINE-Info wird geprüft...", checkingLine: "LINE-Info wird überprüft...", checkingSlot: "Verfügbarkeit wird geprüft...", saving: "Buchung wird gespeichert...", saved: "Buchung gespeichert. Benachrichtigung via LINE gesendet.", notFound: "Buchungsinformationen nicht gefunden.\nBitte Lehrer kontaktieren.", liffError: "LINE-Info konnte nicht abgerufen werden.\nBitte in LINE erneut öffnen.", slotTaken: "Sorry, dieser Zeitslot wurde gerade gebucht.\nSie werden erstattet.", saveFailed: "Speichern fehlgeschlagen. Bitte Lehrer kontaktieren." },
      };
      const ST = STATUS_TRANS[lang] || null;

      function setStatus(jaText, enText) {
        statusEl.textContent = jaText + (enText ? "\n" + enText : "");
      }

      try {
        setStatus("決済情報とLINE情報を確認しています...", ST ? ST.checkingInfo : "Checking payment & LINE info...");

        // StripeとLIFFを並行初期化
        const [checkoutResult] = await Promise.all([
          getCheckoutData().catch(e => { console.error(e); return {}; }),
          liff.init({ liffId: LIFF_ID }).catch(e => { console.error(e); })
        ]);

        checkoutData = checkoutResult || {};
        paymentIntentId = checkoutData.payment_intent || "";
        if (checkoutData.selectedDate) date = checkoutData.selectedDate;
        if (checkoutData.selectedTime) time = checkoutData.selectedTime;
        if (checkoutData.lessonType) lessonType = checkoutData.lessonType;
        if (checkoutData.price) {
          priceLabel = "$" + checkoutData.price;
        } else if (localPrice) {
          priceLabel = "$" + localPrice;
        }

      } catch (error) {
        console.error("Init error:", error);
      }

      if (!date || !time || !lessonType) {
        statusEl.classList.add("error");
        setStatus("予約情報が見つかりませんでした。\n先生にご連絡ください。", ST ? ST.notFound : "");
        return;
      }

      const lessonLabel = Number(lessonType) === 50 ? "50分レッスン" : "25分レッスン";

      try {
        setStatus("LINE情報を確認しています...", ST ? ST.checkingLine : "Verifying LINE info...");

        if (!liff.isLoggedIn()) {
          liff.login({ redirectUri: window.location.href });
          return;
        }

        profile = await liff.getProfile();

        if (!profile || !profile.userId) {
          throw new Error("LINE userIdを取得できませんでした。");
        }

      } catch (error) {
        console.error("LIFF error:", error);
        statusEl.classList.add("error");
        setStatus("LINE情報の取得に失敗しました。\nLINEアプリ内で開き直して、もう一度お試しください。", ST ? ST.liffError : "");
        return;
      }

      const reservationData = {
        name: profile.displayName || "LINEユーザー",
        customerLineUserId: profile.userId,
        userId: profile.userId,
        date: date,
        time: time,
        lesson: lessonLabel,
        lessonName: lessonLabel,
        price: priceLabel,
        email: "",
        status: "予約確定",
        paymentIntentId: paymentIntentId
      };

      try {
        setStatus("予約を確定しています...", ST ? ST.checkingSlot : "Confirming reservation...");
        document.getElementById("processingOverlay").classList.add("show");

        const tempReservationId = localStorage.getItem("tempReservationId");

        if (tempReservationId) {
          // 仮予約を確定（カレンダーブロック解除→Meet付き本番イベント作成）
          const confirmRes = await fetch(
            GAS_URL + "?action=confirmTempReservation" +
            "&reservationId=" + encodeURIComponent(tempReservationId) +
            "&paymentIntentId=" + encodeURIComponent(paymentIntentId || '') +
            "&t=" + Date.now()
          );
          const confirmData = await confirmRes.json();

          if (!confirmData.ok) {
            // 万が一の競合（他の人が先に確定した場合）→ 返金
            statusEl.classList.add("error");
            setStatus("⚠️ 申し訳ありません。\nこの時間はすでに他の方が予約されました。\n返金処理を行います。", ST ? ST.slotTaken : "Sorry, this time slot was just booked.\nYou will be refunded.");
            if (paymentIntentId) {
              await fetch("https://ami-app-eta.vercel.app/api/refund-payment", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ paymentIntentId: paymentIntentId })
              });
            }
            document.getElementById("closeBtn").style.display = "block";
            return;
          }

          // confirmTempReservationがmeetUrlを返すのでreservationDataに反映
          if (confirmData.meetUrl) reservationData.meetUrl = confirmData.meetUrl;

          // LINEに予約確定通知を送る
          setStatus("予約内容を保存しています...", ST ? ST.saving : "Saving reservation...");
          await fetch(GAS_URL, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "text/plain" },
            body: JSON.stringify({ ...reservationData, action: "notifyOnly" })
          });

        } else {
          // tempReservationIdがない場合（旧フロー互換）→ 通常の空きチェック+保存
          const checkRes = await fetch(
            GAS_URL + "?action=checkSlotAvailable" +
            "&date=" + encodeURIComponent(date) +
            "&time=" + encodeURIComponent(time) +
            "&lesson=" + encodeURIComponent(lessonLabel) +
            "&t=" + Date.now()
          );
          const checkData = await checkRes.json();

          if (!checkData.available) {
            statusEl.classList.add("error");
            setStatus("⚠️ 申し訳ありません。\nこの時間はすでに他の方が予約されました。\n返金処理を行います。", ST ? ST.slotTaken : "Sorry, this time slot was just booked.\nYou will be refunded.");
            if (paymentIntentId) {
              await fetch("https://ami-app-eta.vercel.app/api/refund-payment", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ paymentIntentId: paymentIntentId })
              });
            }
            document.getElementById("closeBtn").style.display = "block";
            return;
          }

          setStatus("予約内容を保存しています...", ST ? ST.saving : "Saving reservation...");
          await fetch(GAS_URL, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "text/plain" },
            body: JSON.stringify(reservationData)
          });
        }

        statusEl.classList.remove("error");
        setStatus("✅ 予約を保存しました。\nLINEに予約完了メッセージを送信しました。", ST ? ST.saved : ((window._successT && window._successT.saved) || "Booking saved. Notification sent via LINE."));

        document.getElementById("processingOverlay").classList.remove("show");

        // 予約内容を表示
        const T = window._successT || {};

        const LESSON_TRANS = {
          en: { lesson: "Lesson", date: "Date", time: "Time", fee: "Fee",
                lessonName50: "50-min Lesson", lessonName25: "25-min Lesson" },
          zh: { lesson: "课程", date: "日期", time: "时间", fee: "费用",
                lessonName50: "50分钟课程", lessonName25: "25分钟课程" },
          ko: { lesson: "레슨", date: "날짜", time: "시간", fee: "요금",
                lessonName50: "50분 레슨", lessonName25: "25분 레슨" },
          th: { lesson: "บทเรียน", date: "วันที่", time: "เวลา", fee: "ค่าเรียน",
                lessonName50: "บทเรียน 50 นาที", lessonName25: "บทเรียน 25 นาที" },
          fr: { lesson: "Leçon", date: "Date", time: "Heure", fee: "Frais",
                lessonName50: "Leçon 50 min", lessonName25: "Leçon 25 min" },
          de: { lesson: "Unterricht", date: "Datum", time: "Uhrzeit", fee: "Gebühr",
                lessonName50: "50-Min-Unterricht", lessonName25: "25-Min-Unterricht" },
        };
        const TL = LESSON_TRANS[lang] || null;

        const lessonDisplay = Number(lessonType) === 50 ? "50分レッスン" : "25分レッスン";
        const lessonSub = TL ? (Number(lessonType) === 50 ? TL.lessonName50 : TL.lessonName25) : null;

        // タイムゾーン変換
        const userTimezone = localStorage.getItem("userTimezone") || "";
        let localTimeStr = "";
        let tzName = "";
        if (userTimezone && userTimezone !== "Asia/Tokyo") {
          try {
            const jstDate = new Date(`${date}T${time}:00+09:00`);
            localTimeStr = jstDate.toLocaleTimeString("en-US", {
              hour: "2-digit", minute: "2-digit", hour12: false, timeZone: userTimezone
            });
            const localDate = jstDate.toLocaleDateString("en-CA", { timeZone: userTimezone });
            if (localDate !== date) {
              const parts = localDate.split("-");
              localTimeStr = `${Number(parts[1])}/${Number(parts[2])} ${localTimeStr}`;
            }
            tzName = new Date().toLocaleTimeString("en-US", {
              timeZoneName: "short", timeZone: userTimezone
            }).split(" ").pop();
          } catch(e) {}
        }

        const timeDisplay = localTimeStr
          ? `${time} (JST) / ${localTimeStr} (${tzName})`
          : `${time} (JST)`;

        const infoArea = document.getElementById("bookingInfoArea");
        if (infoArea) {
          infoArea.style.display = "block";
          infoArea.innerHTML = `
            <div style="display:flex;flex-direction:column;gap:12px;">
              <div style="display:flex;justify-content:space-between;align-items:baseline;">
                <span style="font-size:12px;color:#999;">レッスン${TL ? ` <span style="font-size:11px;color:#ccc;">/ ${TL.lesson}</span>` : ''}</span>
                <span style="font-size:14px;font-weight:600;color:#222;">${lessonDisplay}${lessonSub ? `<br><span style="font-size:11px;font-weight:400;color:#aaa;">${lessonSub}</span>` : ''}</span>
              </div>
              <div style="height:0.5px;background:#eee;"></div>
              <div style="display:flex;justify-content:space-between;align-items:baseline;">
                <span style="font-size:12px;color:#999;">日付${TL ? ` <span style="font-size:11px;color:#ccc;">/ ${TL.date}</span>` : ''}</span>
                <span style="font-size:14px;font-weight:600;color:#222;">${date}</span>
              </div>
              <div style="height:0.5px;background:#eee;"></div>
              <div style="display:flex;justify-content:space-between;align-items:baseline;">
                <span style="font-size:12px;color:#999;">時間${TL ? ` <span style="font-size:11px;color:#ccc;">/ ${TL.time}</span>` : ''}</span>
                <span style="font-size:14px;font-weight:600;color:#222;text-align:right;">
                  ${time} (JST)
                  ${localTimeStr ? `<br><span style="font-size:12px;font-weight:400;color:#aaa;">${localTimeStr} (${tzName})</span>` : ''}
                </span>
              </div>
              ${priceLabel ? `
              <div style="height:0.5px;background:#eee;"></div>
              <div style="display:flex;justify-content:space-between;align-items:baseline;">
                <span style="font-size:12px;color:#999;">料金${TL ? ` <span style="font-size:11px;color:#ccc;">/ ${TL.fee}</span>` : ''}</span>
                <span style="font-size:14px;font-weight:600;color:#06C755;">${priceLabel}</span>
              </div>` : ''}
            </div>
          `;
        }

        showCalendarBtn(date, time, lessonType);
        document.getElementById("closeBtn").style.display = "block";

        localStorage.removeItem("selectedDate");
        localStorage.removeItem("selectedTime");
        localStorage.removeItem("lessonType");
        localStorage.removeItem("price");
        localStorage.removeItem("userId");
        localStorage.removeItem("pendingReservation");
        localStorage.removeItem("tempReservationId");

      } catch (error) {
        console.error("GAS error:", error);
        document.getElementById("processingOverlay").classList.remove("show");
        statusEl.classList.add("error");
        setStatus("保存に失敗しました。\n先生にご連絡ください。", ST ? ST.saveFailed : "Failed to save. Please contact the teacher.");
        document.getElementById("closeBtn").style.display = "block";
      }
    }

    function closePage() {
      if (liff.isInClient()) {
        liff.closeWindow();
      } else {
        history.back();
      }
    }

    saveReservation();
  </script>
</body>
</html>
