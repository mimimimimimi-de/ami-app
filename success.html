<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>決済完了</title>

  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      margin: 0;
      padding: 16px;
      background: #f5f6f7;
      color: #222;
    }

    .container { max-width: 460px; margin: 0 auto; }

    .card {
      background: #fff;
      padding: 28px 20px;
      border-radius: 20px;
      margin-top: 18px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    .status {
      margin-top: 12px;
      color: #06C755;
      font-weight: 600;
      white-space: pre-line;
      font-size: 14px;
      text-align: center;
    }
    .error { color: #d93025 !important; }

    .processing-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.92);
      z-index: 200;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 14px;
    }
    .processing-overlay.show { display: flex; }
    .processing-overlay .spinner {
      width: 40px; height: 40px;
      border: 3px solid #e8e8e8;
      border-top-color: #06C755;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    .processing-overlay .processing-text {
      font-size: 16px; font-weight: 600; color: #333; text-align: center; line-height: 1.6;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>

<body>

<div class="processing-overlay show" id="processingOverlay">
  <div class="spinner"></div>
  <div class="processing-text">処理中...<br><span id="overlaySubText" style="font-size:13px;color:#888;">Processing...</span></div>
</div>

<div class="container">
  <div class="card">
    <p style="font-size:11px;color:#aaa;letter-spacing:0.08em;text-transform:uppercase;text-align:center;margin:0 0 12px;" id="subPaymentComplete">Payment Complete</p>

    <div style="text-align:center;margin-bottom:16px;">
      <div style="width:60px;height:60px;background:#e8faf0;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;margin-bottom:12px;">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#06C755" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <h2 style="margin:0;font-size:22px;color:#06C755;font-weight:600;">決済が完了しました</h2>
      <p style="font-size:13px;color:#aaa;margin:6px 0 0;" id="subThankYou">Thank you for your booking.</p>
    </div>

    <div class="status" id="status">保存中...</div>

    <div id="calendarBtnArea" style="display:none;margin-top:20px;">
      <a id="calendarLink" href="#" target="_blank" style="all:unset;display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;background:#fff;color:#4285f4;border:0.5px solid #c5d8f8;border-radius:12px;font-size:14px;font-weight:600;text-align:center;cursor:pointer;box-sizing:border-box;">
        📅 Googleカレンダーに追加
        <span id="subCalendar" style="font-size:11px;font-weight:400;color:#aaa;">Add to Google Calendar</span>
      </a>
    </div>

    <button id="closeBtn" onclick="closePage()" style="display:none;all:unset;width:100%;box-sizing:border-box;background:#06C755;border-radius:12px;padding:16px;text-align:center;font-size:15px;font-weight:600;color:#fff;cursor:pointer;margin-top:10px;">
      閉じる <span id="subClose" style="font-size:11px;font-weight:400;opacity:0.8;">Close</span>
    </button>
  </div>
</div>

  <script>
    const LIFF_ID = "2009890655-jIJpN1Ya";
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzRX0UZSwDW3h9V7tUGA1grjhNlfU9e60H4hGzABbAJl0cWn40VFwy4D2mY-vgEvSY/exec";

    const SUCCESS_TRANS = {
      en: { paymentComplete: "Payment Complete", thankYou: "Thank you for your booking.", saving: "Saving your reservation...", saved: "✅ Booking saved. Notification sent via LINE.", calendar: "Add to Google Calendar", close: "Close" },
      zh: { paymentComplete: "付款完成", thankYou: "感谢您的预约。", saving: "正在保存预约内容...", saved: "✅ 预约已保存。已通过LINE发送通知。", calendar: "添加到Google日历", close: "关闭" },
      ko: { paymentComplete: "결제 완료", thankYou: "예약해 주셔서 감사합니다.", saving: "예약 내용을 저장하고 있습니다...", saved: "✅ 예약이 저장되었습니다. LINE으로 알림을 보냈습니다.", calendar: "Google 캘린더에 추가", close: "닫기" },
      th: { paymentComplete: "ชำระเงินเสร็จสมบูรณ์", thankYou: "ขอบคุณสำหรับการจอง", saving: "กำลังบันทึกการจอง...", saved: "✅ บันทึกการจองแล้ว แจ้งเตือนทาง LINE แล้ว", calendar: "เพิ่มใน Google Calendar", close: "ปิด" },
      fr: { paymentComplete: "Paiement effectué", thankYou: "Merci pour votre réservation.", saving: "Enregistrement de votre réservation...", saved: "✅ Réservation enregistrée. Notification envoyée via LINE.", calendar: "Ajouter à Google Agenda", close: "Fermer" },
      de: { paymentComplete: "Zahlung abgeschlossen", thankYou: "Danke für Ihre Buchung.", saving: "Buchung wird gespeichert...", saved: "✅ Buchung gespeichert. Benachrichtigung via LINE gesendet.", calendar: "Zu Google Kalender hinzufügen", close: "Schließen" }
    };

    function applySuccessLang() {
      const urlLang = new URLSearchParams(window.location.search).get("lang");
      const lang = urlLang || localStorage.getItem("userLang") || "en";
      if (lang === "ja") return;
      const T = SUCCESS_TRANS[lang] || SUCCESS_TRANS["en"];
      const set = (id, text) => { const el = document.getElementById(id); if (el) el.textContent = text; };
      set("subPaymentComplete", T.paymentComplete);
      set("subThankYou", T.thankYou);
      set("subSaving", T.saving);
      set("subCalendar", T.calendar);
      set("subClose", T.close);
      // オーバーレイのサブテキストも更新
      set("overlaySubText", T.processing || T.saving || "Processing...");
      window._successT = T;
    }

    applySuccessLang();

    const statusEl = document.getElementById("status");

    const localDate = localStorage.getItem("selectedDate");
    const localTime = localStorage.getItem("selectedTime");
    const localLessonType = localStorage.getItem("lessonType");
    const localPrice = localStorage.getItem("price");

    async function getCheckoutData() {
      const params = new URLSearchParams(window.location.search);
      const sessionId = params.get("session_id");

      if (!sessionId) return {};

      try {
        const response = await fetch(`/api/get-checkout-session?session_id=${sessionId}`);
        const data = await response.json();
        if (!response.ok) return {};
        return data;
      } catch (error) {
        console.error("Checkout情報取得エラー:", error);
        return {};
      }
    }

    function toCalDate(d) {
      return d.toISOString().replace(/[-:]/g, "").split(".")[0] + "Z";
    }

    function showCalendarBtn(date, time, lessonType) {
      try {
        const calStart = new Date(`${date}T${time}:00+09:00`);
        const durationMin = Number(lessonType) === 50 ? 50 : 25;
        const calEnd = new Date(calStart.getTime() + durationMin * 60000);

        const calUrl = "https://calendar.google.com/calendar/render?action=TEMPLATE" +
          "&text=" + encodeURIComponent("日本語レッスン（Ami先生）") +
          "&dates=" + toCalDate(calStart) + "/" + toCalDate(calEnd) +
          "&details=" + encodeURIComponent("Ami先生との日本語レッスン");

        document.getElementById("calendarLink").href = calUrl;
        document.getElementById("calendarBtnArea").style.display = "block";
      } catch (e) {
        console.error("カレンダーリンク生成失敗:", e);
      }
    }

    async function saveReservation() {
      let profile;
      let checkoutData = {};
      let paymentIntentId = "";
      let date = localDate;
      let time = localTime;
      let lessonType = localLessonType;
      let priceLabel = "";

      try {
        statusEl.textContent = "決済情報とLINE情報を確認しています...";

        // StripeとLIFFを並行初期化
        const [checkoutResult] = await Promise.all([
          getCheckoutData().catch(e => { console.error(e); return {}; }),
          liff.init({ liffId: LIFF_ID }).catch(e => { console.error(e); })
        ]);

        checkoutData = checkoutResult || {};
        paymentIntentId = checkoutData.payment_intent || "";
        if (checkoutData.selectedDate) date = checkoutData.selectedDate;
        if (checkoutData.selectedTime) time = checkoutData.selectedTime;
        if (checkoutData.lessonType) lessonType = checkoutData.lessonType;
        if (checkoutData.price) {
          priceLabel = "$" + checkoutData.price;
        } else if (localPrice) {
          priceLabel = "$" + localPrice;
        }

      } catch (error) {
        console.error("Init error:", error);
      }

      if (!date || !time || !lessonType) {
        statusEl.classList.add("error");
        statusEl.textContent = "予約情報が見つかりませんでした。\n先生にご連絡ください。";
        return;
      }

      const lessonLabel = Number(lessonType) === 50 ? "50分レッスン" : "25分レッスン";

      try {
        statusEl.textContent = "LINE情報を確認しています...";

        if (!liff.isLoggedIn()) {
          liff.login({ redirectUri: window.location.href });
          return;
        }

        profile = await liff.getProfile();

        if (!profile || !profile.userId) {
          throw new Error("LINE userIdを取得できませんでした。");
        }

      } catch (error) {
        console.error("LIFF error:", error);
        statusEl.classList.add("error");
        statusEl.textContent =
          "LINE情報の取得に失敗しました。\nLINEアプリ内で開き直して、もう一度お試しください。";
        return;
      }

      const reservationData = {
        name: profile.displayName || "LINEユーザー",
        customerLineUserId: profile.userId,
        userId: profile.userId,
        date: date,
        time: time,
        lesson: lessonLabel,
        lessonName: lessonLabel,
        price: priceLabel,
        email: "",
        status: "予約確定",
        paymentIntentId: paymentIntentId
      };

      try {
        statusEl.textContent = "空き状況を確認しています...\nChecking availability...";
        document.getElementById("processingOverlay").classList.add("show");

        // 空き確認と予約保存を順番に実行
        const checkRes = await fetch(
          GAS_URL + "?action=checkSlotAvailable" +
          "&date=" + encodeURIComponent(date) +
          "&time=" + encodeURIComponent(time) +
          "&lesson=" + encodeURIComponent(lessonLabel) +
          "&t=" + Date.now()
        );
        const checkData = await checkRes.json();

        if (!checkData.available) {
          statusEl.classList.add("error");
          statusEl.textContent =
            "⚠️ 申し訳ありません。\nこの時間はすでに他の方が予約されました。\n返金処理を行います。\n\nSorry, this time slot was just booked by someone else.\nYou will be refunded.";
          if (paymentIntentId) {
            await fetch("https://ami-app-eta.vercel.app/api/refund-payment", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ paymentIntentId: paymentIntentId })
            });
          }
          document.getElementById("closeBtn").style.display = "block";
          return;
        }

        statusEl.textContent = "予約内容を保存しています...\nSaving reservation...";

        await fetch(GAS_URL, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "text/plain" },
          body: JSON.stringify(reservationData)
        });

        statusEl.classList.remove("error");
        statusEl.textContent =
          "✅ 予約を保存しました。\nLINEに予約完了メッセージを送信しました。\n" + ((window._successT && window._successT.saved) || "Booking saved. Notification sent via LINE.");

        document.getElementById("processingOverlay").classList.remove("show");
        showCalendarBtn(date, time, lessonType);
        document.getElementById("closeBtn").style.display = "block";

        localStorage.removeItem("selectedDate");
        localStorage.removeItem("selectedTime");
        localStorage.removeItem("lessonType");
        localStorage.removeItem("price");
        localStorage.removeItem("userId");
        localStorage.removeItem("pendingReservation");
        localStorage.removeItem("tempReservationId");

      } catch (error) {
        console.error("GAS error:", error);
        document.getElementById("processingOverlay").classList.remove("show");
        statusEl.classList.add("error");
        statusEl.textContent = "保存に失敗しました。\n先生にご連絡ください。\nFailed to save. Please contact the teacher.";
        document.getElementById("closeBtn").style.display = "block";
      }
    }

    function closePage() {
      if (liff.isInClient()) {
        liff.closeWindow();
      } else {
        history.back();
      }
    }

    saveReservation();
  </script>
</body>
</html>
