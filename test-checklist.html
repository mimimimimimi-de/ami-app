<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ami Lesson - テストチェックリスト</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap');
  :root {
    --green: #06C755; --green-light: #e8faf0; --red: #e74c3c; --red-light: #fdf0ef;
    --orange: #f39c12; --blue: #3498db; --border: #e8e8e8; --text: #1a1a2e; --text2: #666; --gray: #f5f6f7;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans JP', sans-serif; background: #f0f4f8; color: var(--text); min-height: 100vh; }
  .header { background: var(--green); padding: 20px 24px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(6,199,85,0.3); }
  .header-inner { max-width: 960px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  .header-title { font-size: 18px; font-weight: 900; color: #fff; }
  .header-title span { font-size: 12px; font-weight: 400; opacity: 0.85; display: block; }
  .progress-wrap { display: flex; align-items: center; gap: 12px; }
  .progress-bar { width: 160px; height: 8px; background: rgba(255,255,255,0.3); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; background: #fff; border-radius: 99px; transition: width 0.4s ease; }
  .progress-text { font-size: 13px; font-weight: 700; color: #fff; white-space: nowrap; }
  .reset-btn { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4); color: #fff; padding: 6px 14px; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; }
  .main { max-width: 960px; margin: 0 auto; padding: 20px 16px 60px; }
  .legend { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; background: #fff; padding: 12px 16px; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text2); }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 700; }
  .badge-red { background: var(--red); color: #fff; }
  .badge-orange { background: var(--orange); color: #fff; }
  .badge-blue { background: var(--blue); color: #fff; }
  .summary { background: #fff; border-radius: 16px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 6px rgba(0,0,0,0.06); }
  .summary-title { font-size: 14px; font-weight: 700; margin-bottom: 12px; color: var(--text2); }
  .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px; }
  .summary-card { background: var(--gray); border-radius: 10px; padding: 12px; text-align: center; }
  .summary-num { font-size: 26px; font-weight: 900; font-family: 'DM Mono', monospace; }
  .summary-label { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .summary-card.green .summary-num { color: var(--green); }
  .summary-card.red .summary-num { color: var(--red); }
  .summary-card.orange .summary-num { color: var(--orange); }
  .section { background: #fff; border-radius: 16px; margin-bottom: 12px; overflow: hidden; box-shadow: 0 1px 6px rgba(0,0,0,0.06); }
  .section-header { padding: 14px 18px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; user-select: none; }
  .section-header:hover { background: #fafafa; }
  .section-title { display: flex; align-items: center; gap: 10px; font-size: 15px; font-weight: 700; }
  .section-meta { display: flex; align-items: center; gap: 10px; }
  .section-count { font-size: 12px; color: var(--text2); font-family: 'DM Mono', monospace; }
  .section-toggle { font-size: 16px; color: var(--text2); transition: transform 0.2s; }
  .test-item { padding: 12px 18px; border-top: 1px solid var(--border); transition: background 0.15s; }
  .test-item.checked { background: var(--green-light); }
  .test-item.has-bug { background: var(--red-light); }
  .item-top { display: flex; align-items: flex-start; gap: 10px; }
  .item-checkbox { width: 20px; height: 20px; border: 2px solid var(--border); border-radius: 5px; flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; margin-top: 2px; transition: all 0.15s; background: #fff; }
  .test-item.checked .item-checkbox { background: var(--green); border-color: var(--green); }
  .item-checkbox-mark { color: #fff; font-size: 12px; display: none; }
  .test-item.checked .item-checkbox-mark { display: block; }
  .item-content { flex: 1; }
  .item-header { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 3px; }
  .item-title { font-size: 13px; font-weight: 700; cursor: pointer; line-height: 1.5; }
  .item-desc { font-size: 11px; color: var(--text2); line-height: 1.6; margin-bottom: 4px; }
  .item-expected { font-size: 11px; color: #059144; background: var(--green-light); padding: 5px 8px; border-radius: 6px; border-left: 3px solid var(--green); line-height: 1.5; margin-bottom: 6px; }
  .bug-toggle { font-size: 11px; color: var(--red); cursor: pointer; font-weight: 700; background: none; border: none; padding: 0; font-family: 'Noto Sans JP', sans-serif; }
  .bug-memo { margin-top: 5px; width: 100%; padding: 7px 10px; border: 1px solid #f5a5a0; border-radius: 8px; font-size: 12px; font-family: 'Noto Sans JP', sans-serif; resize: vertical; min-height: 50px; background: #fff8f8; color: var(--text); }
  .bug-memo:focus { outline: none; border-color: var(--red); }
  .bug-memo-wrap { display: none; }
  .bug-memo-wrap.open { display: block; }
  .bug-mark { font-size: 10px; color: var(--red); font-weight: 700; background: var(--red-light); padding: 2px 7px; border-radius: 99px; }
  .add-form { padding: 18px; display: flex; flex-direction: column; gap: 12px; }
  .add-form label { font-size: 12px; font-weight: 700; display: block; margin-bottom: 5px; }
  .add-form input, .add-form select { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: 10px; font-size: 13px; font-family: 'Noto Sans JP', sans-serif; }
  .add-btn { background: var(--green); color: #fff; border: none; padding: 13px; border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; }
  .save-status { text-align: center; font-size: 11px; color: var(--text2); padding: 8px; }
  .priority-wrap { display: flex; gap: 10px; flex-wrap: wrap; }
  .priority-wrap label { display: flex; align-items: center; gap: 5px; font-size: 12px; cursor: pointer; font-weight: 400; }
  .group-label { font-size: 11px; font-weight: 700; color: var(--text2); background: var(--gray); padding: 6px 18px; letter-spacing: 0.05em; }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="header-title">🧪 Ami Lesson テストチェックリスト<span>Test Checklist</span></div>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <div class="progress-text" id="progressText">0 / 0</div>
      <button class="reset-btn" onclick="resetAll()">リセット</button>
    </div>
  </div>
</div>

<div class="main">
  <div class="summary">
    <div class="summary-title">📊 テスト進捗</div>
    <div class="summary-grid">
      <div class="summary-card green"><div class="summary-num" id="statDone">0</div><div class="summary-label">完了</div></div>
      <div class="summary-card"><div class="summary-num" id="statTotal">0</div><div class="summary-label">合計</div></div>
      <div class="summary-card red"><div class="summary-num" id="statBug">0</div><div class="summary-label">バグあり</div></div>
      <div class="summary-card orange"><div class="summary-num" id="statRemain">0</div><div class="summary-label">未完了</div></div>
    </div>
  </div>
  <div class="legend">
    <div class="legend-item"><span class="badge badge-red">🔴 必須</span>お金・予約に関わる重要機能</div>
    <div class="legend-item"><span class="badge badge-orange">🟡 重要</span>通知・表示など</div>
    <div class="legend-item"><span class="badge badge-blue">🔵 確認</span>UI・多言語など</div>
  </div>
  <div id="sections"></div>
  <div class="section">
    <div class="section-header" onclick="toggleSection('__add__')">
      <div class="section-title"><span>➕</span>テスト項目を追加する</div>
      <div class="section-meta"><span class="section-toggle" id="toggle___add__">▾</span></div>
    </div>
    <div id="body___add__">
      <div class="add-form">
        <div><label>カテゴリ <span style="color:var(--red)">*</span></label><select id="addCategory"><option value="">選択してください</option></select></div>
        <div><label>テスト項目名 <span style="color:var(--red)">*</span></label><input id="addTitle" type="text" placeholder="例：ボタンをタップすると画面が遷移する"></div>
        <div><label>テスト手順</label><input id="addDesc" type="text" placeholder="例：ボタンをタップする"></div>
        <div><label>期待する結果</label><input id="addExpected" type="text" placeholder="例：次の画面に遷移する"></div>
        <div><label>優先度</label>
          <div class="priority-wrap">
            <label><input type="radio" name="addPriority" value="🔴" checked><span class="badge badge-red">🔴 必須</span></label>
            <label><input type="radio" name="addPriority" value="🟡"><span class="badge badge-orange">🟡 重要</span></label>
            <label><input type="radio" name="addPriority" value="🔵"><span class="badge badge-blue">🔵 確認</span></label>
          </div>
        </div>
        <button class="add-btn" onclick="addCustomItem()">➕ 追加する</button>
      </div>
    </div>
  </div>
  <div class="save-status" id="saveStatus">💾 読み込み中...</div>
</div>

<script>

let state = {};

async function loadStateFromGAS() {
  try {
    document.getElementById('saveStatus').textContent = '🔄 読み込み中...';
    const res = await fetch(GAS_URL + '?action=load&t=' + Date.now());
    const data = await res.json();
    if (data.ok) {
      state = data.data || {};
      document.getElementById('saveStatus').textContent = '✅ 読み込み完了（' + new Date().toLocaleTimeString() + '）';
      renderSections();
    }
  } catch(e) {
    state = loadStateLocal();
    document.getElementById('saveStatus').textContent = '⚠️ オフライン。ローカル保存中。';
    renderSections();
  }
}

async function saveStateToGAS(key, value) {
  try {
    document.getElementById('saveStatus').textContent = '💾 保存中...';
    await fetch(GAS_URL + '?action=save&key=' + encodeURIComponent(key) + '&value=' + encodeURIComponent(JSON.stringify(value)));
    saveStateLocal(state);
    document.getElementById('saveStatus').textContent = '✅ 保存しました（' + new Date().toLocaleTimeString() + '）';
  } catch(e) {
    saveStateLocal(state);
    document.getElementById('saveStatus').textContent = '⚠️ オフライン。ローカル保存しました。';
  }
}

function loadStateLocal() { try { return JSON.parse(localStorage.getItem('ami_test_state') || '{}'); } catch(e) { return {}; } }
function saveStateLocal(s) { localStorage.setItem('ami_test_state', JSON.stringify(s)); }
function getCustomItems() { return JSON.parse(localStorage.getItem('ami_custom_items') || '[]'); }
function getCustomSections() { return JSON.parse(localStorage.getItem('ami_custom_sections') || '[]'); }

function getFullTestData() {
  const ci = getCustomItems(), cs = getCustomSections();
  const result = TEST_DATA.map(s => ({ ...s, items: [...s.items, ...ci.filter(i => i.categoryId === s.id)] }));
  cs.forEach(s => result.push({ ...s, items: ci.filter(i => i.categoryId === s.id) }));
  return result;
}

function renderSections() {
  const fullData = getFullTestData();
  const container = document.getElementById('sections');
  container.innerHTML = '';
  fullData.forEach(section => {
    const div = document.createElement('div');
    div.className = 'section';
    div.id = 'sec_' + section.id;
    const done = section.items.filter(i => state[i.id]?.checked).length;
    const bugs = section.items.filter(i => state[i.id]?.bug).length;
    div.innerHTML = `
      <div class="section-header" onclick="toggleSection('${section.id}')">
        <div class="section-title"><span>${section.icon}</span>${section.title}${bugs > 0 ? `<span class="bug-mark">🐛 ${bugs}件</span>` : ''}</div>
        <div class="section-meta"><span class="section-count">${done} / ${section.items.length}</span><span class="section-toggle" id="toggle_${section.id}">▾</span></div>
      </div>
      <div id="body_${section.id}">${section.items.map(item => renderItem(item)).join('')}</div>`;
    container.appendChild(div);
  });
  updateStats();
}

function renderItem(item) {
  const s = state[item.id] || {};
  const pc = item.priority === '🔴' ? 'badge-red' : item.priority === '🟡' ? 'badge-orange' : 'badge-blue';
  const hasBug = s.bug && s.memo;
  return `
    <div class="test-item ${s.checked ? 'checked' : ''} ${hasBug ? 'has-bug' : ''}" id="item_${item.id}">
      <div class="item-top">
        <div class="item-checkbox" onclick="toggleCheck('${item.id}')"><span class="item-checkbox-mark">✓</span></div>
        <div class="item-content">
          <div class="item-header">
            <span class="item-title" onclick="toggleCheck('${item.id}')">${item.title}</span>
            <span class="badge ${pc}">${item.priority}</span>
            ${hasBug ? '<span class="bug-mark">🐛 バグあり</span>' : ''}
          </div>
          <div class="item-desc">📋 ${item.desc}</div>
          <div class="item-expected">✅ ${item.expected}</div>
          <div>
            <button class="bug-toggle" onclick="toggleBug('${item.id}')">🐛 バグ・メモを記録</button>
            <div class="bug-memo-wrap ${s.bugOpen ? 'open' : ''}" id="bugwrap_${item.id}">
              <textarea class="bug-memo" id="memo_${item.id}" placeholder="バグの内容・再現手順・メモを入力..." onchange="saveMemo('${item.id}')">${s.memo || ''}</textarea>
            </div>
          </div>
          ${item.custom ? `<button onclick="deleteCustomItem('${item.id}')" style="margin-top:6px;background:none;border:1px solid var(--red);color:var(--red);padding:3px 9px;border-radius:7px;font-size:11px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;">🗑️ 削除</button>` : ''}
        </div>
      </div>
    </div>`;
}

function toggleSection(id) {
  const body = document.getElementById('body_' + id);
  const toggle = document.getElementById('toggle_' + id);
  if (!body) return;
  const isHidden = body.style.display === 'none';
  body.style.display = isHidden ? '' : 'none';
  if (toggle) toggle.style.transform = isHidden ? '' : 'rotate(-90deg)';
}

function toggleCheck(itemId) {
  if (!state[itemId]) state[itemId] = {};
  state[itemId].checked = !state[itemId].checked;
  saveStateToGAS(itemId, state[itemId]);
  renderSections();
}

function toggleBug(itemId) {
  if (!state[itemId]) state[itemId] = {};
  state[itemId].bugOpen = !state[itemId].bugOpen;
  saveStateLocal(state);
  const wrap = document.getElementById('bugwrap_' + itemId);
  if (wrap) {
    wrap.classList.toggle('open', state[itemId].bugOpen);
    if (state[itemId].bugOpen) setTimeout(() => { const ta = document.getElementById('memo_' + itemId); if (ta) ta.focus(); }, 100);
  }
}

function saveMemo(itemId) {
  if (!state[itemId]) state[itemId] = {};
  const ta = document.getElementById('memo_' + itemId);
  if (ta) {
    state[itemId].memo = ta.value;
    state[itemId].bug = ta.value.length > 0;
    saveStateToGAS(itemId, state[itemId]);
    renderSections();
  }
}

function updateStats() {
  let total = 0, done = 0, bugs = 0;
  getFullTestData().forEach(s => s.items.forEach(i => {
    total++; if (state[i.id]?.checked) done++; if (state[i.id]?.bug && state[i.id]?.memo) bugs++;
  }));
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statDone').textContent = done;
  document.getElementById('statBug').textContent = bugs;
  document.getElementById('statRemain').textContent = total - done;
  const pct = total > 0 ? Math.round(done / total * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = done + ' / ' + total;
}

function resetAll() {
  if (!confirm('全てのチェックとメモをリセットしますか？\n※元に戻せません。')) return;
  state = {}; saveStateLocal(state); renderSections();
  document.getElementById('saveStatus').textContent = '🔄 リセットしました';
}

function populateCategories() {
  const select = document.getElementById('addCategory');
  getFullTestData().forEach(s => { const o = document.createElement('option'); o.value = s.id; o.textContent = s.icon + ' ' + s.title; select.appendChild(o); });
  const o = document.createElement('option'); o.value = '__new__'; o.textContent = '＋ 新しいカテゴリを作る'; select.appendChild(o);
}

function addCustomItem() {
  const categoryId = document.getElementById('addCategory').value;
  const title = document.getElementById('addTitle').value.trim();
  const desc = document.getElementById('addDesc').value.trim();
  const expected = document.getElementById('addExpected').value.trim();
  const priority = document.querySelector('input[name="addPriority"]:checked').value;
  if (!categoryId) { alert('カテゴリを選択してください'); return; }
  if (!title) { alert('テスト項目名を入力してください'); return; }
  if (categoryId === '__new__') {
    const newName = prompt('新しいカテゴリ名：'); if (!newName) return;
    const newId = 'custom_' + Date.now();
    const secs = getCustomSections(); secs.push({ id: newId, icon: '📌', title: newName });
    localStorage.setItem('ami_custom_sections', JSON.stringify(secs));
    const select = document.getElementById('addCategory');
    const o = document.createElement('option'); o.value = newId; o.textContent = '📌 ' + newName;
    select.insertBefore(o, select.lastElementChild); select.value = newId;
    addCustomItem(); return;
  }
  const itemId = 'custom_' + Date.now();
  const items = getCustomItems();
  items.push({ id: itemId, priority, title, desc: desc || 'テスト手順を記入', expected: expected || '正常に動作する', custom: true, categoryId });
  localStorage.setItem('ami_custom_items', JSON.stringify(items));
  document.getElementById('addTitle').value = ''; document.getElementById('addDesc').value = '';
  document.getElementById('addExpected').value = ''; document.getElementById('addCategory').value = '';
  renderSections(); alert('✅ 追加しました！');
}

function deleteCustomItem(itemId) {
  if (!confirm('この項目を削除しますか？')) return;
  localStorage.setItem('ami_custom_items', JSON.stringify(getCustomItems().filter(i => i.id !== itemId)));
  delete state[itemId]; saveStateLocal(state); renderSections();
}

populateCategories();
renderSections();
loadStateFromGAS();
</script>
